<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חדר בריחה – השער הנעלם אל עולם הביומימיקרי הקסום</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22%3E%3Cdefs%3E%3CradialGradient id=%22g%22 cx=%2250%25%22 cy=%2245%25%22 r=%2265%25%22%3E%3Cstop offset=%220%25%22 stop-color=%22%235ee7e0%22/%3E%3Cstop offset=%22100%25%22 stop-color=%22%233e2a78%22/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx=%2216%22 cy=%2216%22 r=%2214%22 fill=%22url(%23g)%22/%3E%3C/svg%3E" />
  <script src="js/backend-config.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #020c04;
      --bg-2:          #061a08;
      --panel:         rgba(4, 14, 6, 0.94);
      --panel-light:   rgba(57,224,122,.05);
      --text:          #e4f5e8;
      --muted:         #9ecba8;
      --accent:        #00e8c8;
      --accent-2:      #62ff9a;
      --title:         #7cffd8;
      --heading:       #f0d060;
      --danger:        #ff7070;
      --warning:       #ffd060;
      --success:       #62ff9a;
      --border:        rgba(0,200,140,.18);
      --shadow:        0 20px 50px rgba(0,0,0,.65);
      --radius:        20px;
      --ease:          600ms cubic-bezier(.22,.61,.36,1);
      --forest-glow:   rgba(57,224,122,.14);
      --crystal:       rgba(0,232,200,.22);
      --gold:          #d4a843;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background-color: #000c04;
      background:
        /* Dark tree-edge framing left and right */
        radial-gradient(ellipse at -6% 45%, rgba(0,5,2,.88) 0%, transparent 36%),
        radial-gradient(ellipse at 106% 40%, rgba(0,5,2,.88) 0%, transparent 36%),
        /* Top canopy darkness */
        radial-gradient(ellipse at 50% -8%, rgba(0,12,4,.82) 0%, transparent 48%),
        /* Bioluminescent ground clearing — center bottom */
        radial-gradient(ellipse at 50% 105%, rgba(0,200,90,.38) 0%, rgba(0,120,50,.18) 32%, transparent 60%),
        /* Left forest glow */
        radial-gradient(circle at 10% 68%, rgba(0,160,70,.22) 0%, transparent 32%),
        /* Right forest glow */
        radial-gradient(circle at 90% 62%, rgba(0,130,100,.2) 0%, transparent 30%),
        /* Upper depth layers */
        radial-gradient(circle at 25% 30%, rgba(57,224,122,.07) 0%, transparent 28%),
        radial-gradient(circle at 75% 25%, rgba(0,200,150,.06) 0%, transparent 24%),
        /* Base — deep enchanted forest */
        linear-gradient(175deg, #000c04 0%, #001309 30%, #000b04 60%, #001208 100%);
      color: var(--text);
      font-family: "Assistant", "Rubik", Arial, sans-serif;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    body { padding: 12px; }
    html, body {
      background-color: #000d05 !important;
      background-image: var(--screen-bg-image, linear-gradient(175deg, #000c04 0%, #001309 30%, #000b04 60%, #001208 100%)) !important;
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
      background-attachment: fixed !important;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -15vh -15vw;
      pointer-events: none;
    }
    body::before {
      z-index: -2;
      filter: blur(32px);
      background:
        radial-gradient(ellipse at 50% 92%, rgba(0,220,100,.32) 0%, transparent 46%),
        radial-gradient(circle at 15% 78%, rgba(210,175,40,.15) 0%, transparent 28%),
        radial-gradient(circle at 85% 72%, rgba(0,210,140,.16) 0%, transparent 26%),
        radial-gradient(circle at 20% 52%, rgba(57,224,122,.18) 0%, transparent 42%),
        radial-gradient(circle at 80% 48%, rgba(0,232,180,.14) 0%, transparent 38%),
        radial-gradient(ellipse at 50% 18%, rgba(0,140,80,.14) 0%, transparent 40%),
        radial-gradient(circle at 6%  12%, rgba(80,200,80,.10) 0%, transparent 28%),
        radial-gradient(circle at 94% 8%,  rgba(0,180,120,.10) 0%, transparent 26%);
      animation: forestAura 20s ease-in-out infinite alternate;
    }
    body::after {
      z-index: -1;
      opacity: .68;
      background:
        radial-gradient(circle at 9%  24%,  rgba(255,210,70,.88) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 27% 66%,  rgba(57,224,122,.85) 0 1px,   transparent 2px),
        radial-gradient(circle at 45% 36%,  rgba(0,232,200,.70) 0 1.3px,  transparent 2.3px),
        radial-gradient(circle at 63% 82%,  rgba(255,198,55,.78) 0 1px,   transparent 1.8px),
        radial-gradient(circle at 81% 19%,  rgba(57,224,122,.80) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 93% 57%,  rgba(0,232,180,.65) 0 1.2px,  transparent 2px),
        radial-gradient(circle at 5%  88%,  rgba(200,255,95,.62) 0 1px,   transparent 2px),
        radial-gradient(circle at 37% 9%,   rgba(255,208,65,.75) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 56% 52%,  rgba(255,228,48,.50) 0 1px,   transparent 1.8px),
        radial-gradient(circle at 73% 44%,  rgba(57,224,122,.60) 0 1.2px, transparent 2px),
        radial-gradient(circle at 17% 73%,  rgba(0,220,160,.58) 0 1px,    transparent 1.8px),
        radial-gradient(circle at 87% 80%,  rgba(255,205,78,.70) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 43% 90%,  rgba(57,224,122,.64) 0 1px,   transparent 2px),
        radial-gradient(circle at 61% 15%,  rgba(0,232,200,.76) 0 1.2px,  transparent 2.2px),
        radial-gradient(circle at 96% 30%,  rgba(255,218,58,.60) 0 1px,   transparent 1.8px),
        radial-gradient(circle at 2%  44%,  rgba(100,255,145,.52) 0 1.5px,transparent 2.5px),
        radial-gradient(circle at 50% 70%,  rgba(255,220,50,.42) 0 2px,   transparent 3.5px),
        radial-gradient(circle at 32% 48%,  rgba(0,255,180,.38) 0 1px,    transparent 2px);
      background-size:
        300px 340px, 370px 280px, 450px 410px, 330px 450px,
        410px 330px, 290px 390px, 470px 320px, 350px 370px,
        430px 310px, 380px 340px, 320px 400px, 440px 280px,
        360px 420px, 400px 300px, 280px 360px, 490px 340px,
        260px 300px, 340px 380px;
      animation: fireflyFloat 40s linear infinite;
    }

    @keyframes forestAura {
      from { transform: translate3d(-2%, -1.5%, 0) scale(1); }
      to   { transform: translate3d(2%, 2%, 0) scale(1.06); }
    }
    @keyframes fireflyFloat {
      0%   { transform: translateY(0)      translateX(0);    opacity: .68; }
      20%  { transform: translateY(-55px)  translateX(22px); opacity: .80; }
      40%  { transform: translateY(-112px) translateX(-16px); opacity: .58; }
      60%  { transform: translateY(-172px) translateX(28px); opacity: .74; }
      80%  { transform: translateY(-228px) translateX(-10px); opacity: .62; }
      100% { transform: translateY(-288px) translateX(0);    opacity: .68; }
    }

    #app {
      width: min(720px, calc(100vw - 24px));
      max-height: none;
      margin-inline: auto;
      transform-origin: top center;
      font-size: 75%;
      background: transparent;
      background-image: none;
      background-size: auto;
      background-position: initial;
      background-repeat: no-repeat;
      border: none;
      border-radius: 0;
      overflow: visible;
      box-shadow: none;
      min-height: auto;
      backdrop-filter: none;
      position: relative;
      transition: width 0.28s ease-out;
    }
    /* Glowing portal arch rim at top */
    #app::before {
      content: "";
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg,
        transparent,
        rgba(0,232,180,.6) 25%,
        rgba(57,255,140,.85) 50%,
        rgba(0,232,180,.6) 75%,
        transparent);
      box-shadow: 0 0 20px rgba(0,232,180,.5), 0 0 44px rgba(0,200,140,.24);
      z-index: 0;
      animation: archPulse 5s ease-in-out infinite alternate;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
    }
    @keyframes archPulse {
      from { opacity: .55; box-shadow: 0 0 16px rgba(0,232,180,.42), 0 0 32px rgba(0,200,140,.18); }
      to   { opacity: 1;   box-shadow: 0 0 28px rgba(0,232,180,.68), 0 0 58px rgba(0,200,140,.30); }
    }
    /* Mist at the bottom of the app container */
    #app::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: -5%;
      right: -5%;
      height: 120px;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 30% 100%, rgba(0,180,80,.12), transparent 60%),
        radial-gradient(ellipse at 70% 100%, rgba(0,160,120,.10), transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(57,224,122,.08), transparent 65%);
      filter: blur(12px);
      z-index: 0;
      animation: mistDrift 14s ease-in-out infinite alternate;
      opacity: 0;
      visibility: hidden;
    }
    @keyframes mistDrift {
      from { transform: translateX(-2%) scaleX(1); opacity: .8; }
      to   { transform: translateX(2%) scaleX(1.04); opacity: 1; }
    }

    #app.screen-zoom-60 { font-size: 60%; }
    #app.screen-zoom-70 { font-size: 70%; }
    #app.screen-zoom-115 { font-size: 115%; }
    #app.screen-fit-70 { font-size: 70%; }
    #app.screen-fit-70 #game-screen {
      max-height: calc(100vh - 24px - 52px);
      overflow: hidden;
    }

    /* מסכי שחקן מוקדמים (דלת + שלבים 1–3): קומפקטי, בלי שכבת כהות על #app, בלי רוחב מותח */
    body.player-early-screens::before,
    body.player-early-screens::after {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #app.screen-player-flow {
      width: min(680px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      background: transparent;
      background-image: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    #app.screen-player-flow::after {
      opacity: 0;
      height: 0;
      pointer-events: none;
    }
    #app.screen-player-flow #game-screen {
      padding: 10px 12px 14px;
      min-height: 0;
      max-height: calc(100vh - 24px - 52px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #app.screen-player-flow.screen-fit-70 #game-screen {
      overflow: hidden;
    }
    #app.screen-player-flow .card {
      background: transparent !important;
      background-image: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }
    #app.screen-player-flow .card.s1-option-btn,
    #app.screen-player-flow .s1-option-btn {
      background: rgba(136,243,185,.90) !important;
      border-color: rgba(136,243,185,.95) !important;
      box-shadow: none !important;
    }
    #app.screen-player-flow .card.s1-option-btn:hover,
    #app.screen-player-flow .s1-option-btn:hover {
      background: rgba(136,243,185,.98) !important;
      border-color: rgba(136,243,185,1) !important;
      box-shadow: 0 4px 16px rgba(136,243,185,.2) !important;
    }
    #app.screen-player-flow .card.option-btn,
    #app.screen-player-flow .option-btn {
      background: rgba(57,224,122,.96) !important;
      border-color: rgba(0,200,140,.80) !important;
      box-shadow: none !important;
    }
    #app.screen-player-flow .card.option-btn:hover,
    #app.screen-player-flow .option-btn:hover {
      background: rgba(0,200,140,.72) !important;
      border-color: var(--accent) !important;
      box-shadow: 0 6px 22px rgba(0,200,140,.28) !important;
    }
    #app.screen-player-flow .card.stage3-option-btn,
    #app.screen-player-flow .stage3-option-btn {
      background: linear-gradient(145deg, rgba(17,40,79,.95), rgba(9,26,55,.96) 60%, rgba(7,20,43,.98)) !important;
      border-color: rgba(176,222,255,.45) !important;
      box-shadow: 0 10px 22px rgba(0,0,0,.42), 0 0 18px rgba(98,217,255,.14), inset 0 1px 0 rgba(255,255,255,.12) !important;
    }
    #app.screen-player-flow .card.stage3-option-btn:hover,
    #app.screen-player-flow .stage3-option-btn:hover {
      background: linear-gradient(145deg, rgba(20,48,93,.98), rgba(10,31,63,.98) 60%, rgba(8,24,50,.98)) !important;
      border-color: rgba(136,243,185,.72) !important;
      box-shadow: 0 14px 28px rgba(0,0,0,.45), 0 0 24px rgba(136,243,185,.24), inset 0 1px 0 rgba(255,255,255,.16) !important;
    }
    #app.screen-player-flow .card::before,
    #app.screen-player-flow .card::after {
      content: none !important;
      display: none !important;
    }

    /* מסך דלת יחידה: נשאר ברוחב זהה לשאר מסכי השחקן המוקדמים */
    #app.screen-door-selection {
      width: min(680px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow-y: hidden;
      background: transparent;
      background-image: none;
      box-shadow: none;
    }
    #app.screen-door-selection #game-screen {
      max-height: calc(100vh - 24px - 52px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #app.screen-step6-wide {
      width: min(1180px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
    }
    #app.screen-step6-wide .card {
      animation: none !important;
    }
    #app.screen-step6-wide #game-screen {
      max-height: none;
      overflow-x: hidden;
      overflow-y: visible;
    }
    body.step6-zoom-open {
      overflow: hidden;
    }
    #app.screen-door-selection .card {
      background: transparent !important;
      background-image: none !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }
    #app.screen-door-selection .card::before,
    #app.screen-door-selection .card::after {
      content: none !important;
      display: none !important;
    }

    /* רוחב כפתורי תשובה מצומצם בלבד — בלי שינוי גובה או גודל טקסט */
    #app.screen-player-flow .s1-options {
      flex: 1 1 auto;
      min-width: 0;
      max-width: min(300px, 48%);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    #app.screen-player-flow .s1-option-btn {
      width: 100%;
      max-width: 100%;
    }
    #app.screen-player-flow .s1-split.stage3-split .stage3-options-col {
      flex: 1 1 auto;
      min-width: 0;
      max-width: min(300px, 48%);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    #app.screen-player-flow .stage3-option-btn {
      width: 100%;
      max-width: 100%;
    }
    /* שלב 3 לצד תמונה (כמו שלב 1/2) — כפל מחלקות כדי לגבור על .s1-split */
    .s1-split.stage3-split {
      align-items: flex-start;
      gap: 16px;
      margin-top: 8px;
    }
    .s1-split.stage3-split .stage3-image-frame {
      flex: 0 0 auto;
      width: 160px;
      min-width: 160px;
      max-width: 160px;
      min-height: 160px;
      max-height: min(240px, 42vh);
      margin: 0;
    }
    .s1-split.stage3-split .stage3-image-frame img {
      max-width: 100%;
      max-height: min(220px, 40vh);
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }
    .s1-split.stage3-split .habitat-hint {
      text-align: right;
      margin-top: 0;
      margin-bottom: 2px;
    }
    @media (max-width: 520px) {
      .s1-split.stage3-split {
        flex-direction: column;
        align-items: center;
      }
      .s1-split.stage3-split .stage3-image-frame {
        width: min(160px, 88vw);
        min-width: 0;
        max-width: 100%;
      }
      #app.screen-player-flow .s1-options,
      #app.screen-player-flow .s1-split.stage3-split .stage3-options-col {
        max-width: 100%;
      }
    }
    .step5-instructions-card {
      text-align: right;
    }
    .step5-instructions-card .step5-instructions-body {
      font-size: 1.05rem;
      line-height: 1.65;
      color: #dff6ef;
      text-align: right;
      margin: 10px 0 16px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(0, 232, 180, 0.34);
      background: linear-gradient(180deg, rgba(0, 26, 20, 0.92), rgba(0, 20, 14, 0.88));
      box-shadow: inset 0 0 20px rgba(0, 232, 180, 0.06);
    }
    .step5-instructions-card .step5-instructions-body p {
      margin: 0 0 10px;
    }
    .step5-instructions-card {
      background: linear-gradient(160deg, rgba(0,20,14,0.92), rgba(0,36,24,0.88)) !important;
      border: 1px solid rgba(0,232,180,0.22) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45) !important;
    }
    .step5-victory-card {
      background: linear-gradient(160deg, rgba(0,20,14,0.92), rgba(0,36,24,0.88)) !important;
      border: 1px solid rgba(0,232,180,0.22) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45) !important;
    }
    .step5-victory-copy {
      display: none;
    }

    /* ---- Header ---- */
    #game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: linear-gradient(180deg, rgba(57,224,122,.07), rgba(0,0,0,.02));
      border-bottom: 1px solid rgba(0,200,140,.18);
      font-size: 0.9rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    #game-header .logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--title);
    }
    #progress-bar-outer {
      flex: 1;
      max-width: 260px;
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 99px;
      transition: width var(--ease);
      width: 0%;
    }

    /* ---- Status bar ---- */
    #status-bar {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      border-radius: 0;
      transition: background .3s;
    }
    #status-bar.error   { background: rgba(255,100,120,.15); color: var(--danger); }
    #status-bar.success { background: rgba(120,255,180,.12); color: var(--success); }
    #status-bar.idle    { background: transparent; color: transparent; }

    /* ---- Main screen ---- */
    #game-screen {
      padding: clamp(16px, 2.8vw, 36px);
      min-height: min(620px, calc(100vh - 170px));
      max-height: calc(100vh - 24px - 56px);
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }
    @keyframes screenFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #game-screen.screen-transitioning {
      animation: screenFadeIn 0.22s ease both;
    }

    /* ---- Cards ---- */
    .card {
      background: linear-gradient(160deg, rgba(0,18,12,0.90), rgba(0,30,20,0.86));
      border: 1px solid rgba(0,232,180,0.18);
      border-radius: 22px;
      padding: clamp(10px, 1.7vw, 18px);
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
      box-shadow: none;
      animation: fadeInUp .5s ease both;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: none;
    }
    /* Vine corner decoration */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
      background: none;
      z-index: 0;
    }
    .card + .card { margin-top: 18px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Typography ---- */
    .screen-eyebrow {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    @keyframes titleCyanPulse {
      0%,100% {
        text-shadow:
          0 0 10px rgba(80,255,245,.55),
          0 0 22px rgba(60,200,255,.45),
          0 0 44px rgba(40,170,255,.25),
          0 0 80px rgba(30,140,255,.12);
      }
      50% {
        text-shadow:
          0 0 16px rgba(80,255,245,.95),
          0 0 32px rgba(60,200,255,.75),
          0 0 60px rgba(40,170,255,.50),
          0 0 100px rgba(30,140,255,.28);
      }
    }
    .screen-title {
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      font-weight: 800;
      color: var(--title);
      margin-bottom: 6px;
      line-height: 1.3;
      animation: titleCyanPulse 3s ease-in-out infinite;
    }
    .screen-subtitle {
      font-size: .95rem;
      color: #9be9ff;
      margin-top: -4px;
      margin-bottom: 8px;
      line-height: 1.45;
    }
    .screen-body {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .question-highlight {
      display: inline;
      padding: .16em .5em;
      border-radius: 10px;
      background: rgba(8, 24, 44, .62);
      border: 1px solid rgba(120, 235, 255, 0.18);
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .hint-box {
      background: rgba(18,12,2,.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(212,168,67,.5);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: var(--warning);
      margin-top: 12px;
      box-shadow: 0 0 22px rgba(212,168,67,.22), inset 0 0 12px rgba(212,168,67,.06);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 700;
    }
    .badge-code {
      background: rgba(0,232,180,.12);
      border: 1px solid rgba(0,232,180,.28);
      color: var(--accent);
    }
    .code-reveal {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--heading);
      letter-spacing: .1em;
      background: rgba(212,168,67,.1);
      border: 1px solid rgba(212,168,67,.28);
      border-radius: 10px;
      padding: 10px 20px;
      display: inline-block;
      margin: 8px 0;
      box-shadow: 0 0 24px rgba(212,168,67,.14), inset 0 0 12px rgba(212,168,67,.06);
      text-shadow: 0 0 20px rgba(212,168,67,.5);
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: transform .15s, opacity .15s, box-shadow .2s;
      font-family: inherit;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00b896);
      color: #010803;
      box-shadow: 0 4px 22px rgba(0,232,180,.32);
    }
    .btn-primary:hover { box-shadow: 0 6px 30px rgba(0,232,180,.48); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--panel-light);
      border: 1px solid rgba(0,200,140,.22);
      color: var(--text);
    }
    .btn-secondary:hover { background: rgba(57,224,122,.1); border-color: rgba(0,232,180,.4); }

    @keyframes hintNeonAttract {
      0%   { box-shadow: none;                                                                                                            border-color: rgba(0,200,140,.3);  }
      12%  { box-shadow: 0 0 14px rgba(57,255,140,1), 0 0 32px rgba(57,255,140,.7), 0 0 64px rgba(57,255,140,.35); border-color: rgba(57,255,140,1);  }
      24%  { box-shadow: none;                                                                                                            border-color: rgba(0,200,140,.3);  }
      38%  { box-shadow: 0 0 12px rgba(57,255,140,.85), 0 0 26px rgba(57,255,140,.5), 0 0 48px rgba(57,255,140,.2); border-color: rgba(57,255,140,.9);  }
      50%  { box-shadow: none;                                                                                                            border-color: rgba(0,200,140,.3);  }
      62%  { box-shadow: 0 0 10px rgba(57,255,140,.7),  0 0 20px rgba(57,255,140,.35);                               border-color: rgba(57,255,140,.75); }
      74%  { box-shadow: none;                                                                                                            border-color: rgba(0,200,140,.3);  }
      100% { box-shadow: none;                                                                                                            border-color: rgba(0,200,140,.3);  }
    }
    .hint-toggle-btn {
      border: 2px solid rgba(0,200,140,.5) !important;
      animation: hintNeonAttract 2.4s ease 3;
    }
    .btn-success {
      background: linear-gradient(135deg, #62ff9a, #2eb860);
      color: #010803;
      box-shadow: 0 4px 22px rgba(90,255,130,.28);
    }
    .btn-success:hover { box-shadow: 0 6px 30px rgba(90,255,130,.42); transform: translateY(-1px); }
    .btn-lg { padding: 14px 32px; font-size: 1.1rem; border-radius: 14px; }
    .btn-sm { padding: 8px 16px; font-size: 0.88rem; border-radius: 10px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    /* ---- MCQ Options ---- */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    @media (max-width: 500px) { .options-grid { grid-template-columns: 1fr; } }
    .option-img-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    .option-img-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 10px 14px;
      background: rgba(57,224,122,.24);
      border: 2px solid rgba(0,200,140,.42);
      border-radius: 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .2s, background .2s, transform .12s, box-shadow .2s;
    }
    .option-img-card:hover {
      border-color: var(--accent);
      background: rgba(0,232,180,.20);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,200,140,.2);
    }
    .option-img-card img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 10px;
    }
    .option-img-card .opt-letter {
      min-width: 28px;
      height: 28px;
      background: rgba(98,217,255,.15);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      font-weight: 800;
      color: var(--accent);
    }

    /* ── קריינות + ספירה לאחור ── */
    .narration-overlay {
      position: fixed;
      inset: 0;
      z-index: 320;
      display: grid;
      place-items: center;
      padding: clamp(12px, 3vw, 30px);
      animation: videoOverlayFadeIn .34s ease both;
    }

    .video-overlay__backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 16%, rgba(124, 246, 255, 0.16), transparent 38%),
        radial-gradient(circle at 78% 9%, rgba(149, 110, 255, 0.2), transparent 36%),
        rgba(2, 7, 20, 0.78);
      backdrop-filter: blur(12px) saturate(118%);
      -webkit-backdrop-filter: blur(12px) saturate(118%);
    }

    .video-overlay__dialog {
      position: relative;
      z-index: 1;
      width: min(53vw, 660px);
      animation: videoDialogIn .38s cubic-bezier(.22,.61,.36,1) both;
    }

    @keyframes videoOverlayFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes videoOverlayFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; pointer-events: none; }
    }
    .narration-overlay--fadeout {
      animation: videoOverlayFadeOut .5s ease forwards;
      pointer-events: none;
    }

    @keyframes videoDialogIn {
      from { opacity: 0; transform: translateY(16px) scale(.975); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ============================================================
       MICRO-INTERACTIONS — תחושת לחיצה גלובלית
       ============================================================ */

    /* כל כפתור: מעיך מעט בלחיצה */
    button, [role="button"], .btn, .vault-btn, .s1-option-btn,
    .door-submit-btn, .dyk-popup-btn, .narration-name-btn,
    .flip-card, .match-card, .org-card, .cipher-cell {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    button:active, [role="button"]:active, .btn:active,
    .vault-btn:active, .s1-option-btn:active,
    .door-submit-btn:active, .dyk-popup-btn:active,
    .narration-name-btn:active {
      transform: scale(.94) !important;
      transition: transform .08s ease !important;
    }
    .flip-card:active, .match-card:active, .org-card:active {
      transform: scale(.93) !important;
    }
    .cipher-cell:active {
      transform: scale(.88) !important;
    }

    /* Ripple effect */
    .ripple-host { position: relative; overflow: hidden; }
    @keyframes rippleOut {
      0%   { transform: scale(0); opacity: .55; }
      100% { transform: scale(4); opacity: 0; }
    }
    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      background: rgba(136,243,185,.35);
      pointer-events: none;
      transform: scale(0);
      animation: rippleOut .55s ease forwards;
      z-index: 9999;
    }

    .narration-content {
      position: relative;
      width: 100%;
    }

    .video-overlay__media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: clamp(14px, 2.2vw, 22px);
      border: 1px solid rgba(150, 209, 255, 0.3);
      outline: 1px solid rgba(124, 246, 255, 0.12);
      background:
        radial-gradient(circle at 18% 14%, rgba(98,217,255,.13), transparent 36%),
        linear-gradient(160deg, rgba(10, 21, 45, 0.95), rgba(8, 14, 31, 0.96));
      box-shadow:
        0 34px 70px rgba(0, 0, 0, 0.58),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset,
        0 0 52px rgba(98, 217, 255, 0.15);
      overflow: hidden;
      isolation: isolate;
    }

    .narration-video {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      object-fit: contain;
      background: #02050d;
    }

    .video-overlay__loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: linear-gradient(155deg, rgba(7, 17, 37, 0.58), rgba(10, 21, 46, 0.28));
      color: var(--muted);
      font-size: clamp(0.92rem, 2.1vw, 1rem);
      text-align: center;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .video-overlay__loading::before {
      content: '';
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(124, 246, 255, 0.2);
      border-top-color: var(--accent);
      animation: videoSpinner 1s linear infinite;
      box-shadow: 0 0 18px rgba(98,217,255,.25);
    }

    @keyframes videoSpinner {
      to { transform: rotate(360deg); }
    }

    .narration-content.video-ready .video-overlay__loading {
      opacity: 0;
    }

    .narration-skip-btn {
      position: absolute;
      top: clamp(8px, 1.8vw, 14px);
      inset-inline-start: clamp(8px, 1.8vw, 14px);
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(4, 11, 28, 0.6);
      color: var(--muted);
      font-size: .78rem;
      letter-spacing: .01em;
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .2s ease, color .2s ease, border-color .2s ease, transform .2s ease;
      z-index: 3;
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28), 0 0 18px rgba(98,217,255,.1);
    }
    .narration-skip-btn:hover {
      background: rgba(7, 18, 40, 0.82);
      color: var(--text);
      border-color: rgba(124, 246, 255, 0.45);
      transform: translateY(-1px);
    }

    .narration-cnum {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: clamp(3.4rem, 11vw, 7.4rem);
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(98,217,255,.86);
      pointer-events: none;
      z-index: 2;
      background: linear-gradient(0deg, rgba(1,6,18,.34), rgba(1,6,18,.34));
    }

    @media (max-width: 720px) {
      .narration-overlay {
        padding: 10px;
      }
      .video-overlay__dialog {
        width: min(94vw, 760px);
      }
      .narration-skip-btn {
        font-size: .74rem;
        padding: 6px 12px;
      }
    }

    .option-btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(57,224,122,.96);
      border: 2px solid rgba(0,200,140,.80);
      border-radius: 14px;
      color: var(--text);
      font-size: 0.97rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      text-align: right;
      transition: border-color .2s, background .2s, transform .12s, box-shadow .2s;
    }
    .option-btn:hover {
      border-color: var(--accent);
      background: rgba(0,200,140,.72);
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,200,140,.28);
    }
    .option-btn .opt-letter {
      min-width: 30px;
      height: 30px;
      background: rgba(0,232,180,.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--accent);
    }

    /* ---- Door Screen ---- */
    .door-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
    }
    .door-icon {
      font-size: 5rem;
      animation: doorPulse 2s ease-in-out infinite;
    }
    @keyframes doorPulse {
      0%,100% { filter: drop-shadow(0 0 8px rgba(98,217,255,.4)); }
      50%      { filter: drop-shadow(0 0 22px rgba(98,217,255,.8)); }
    }
    .door-codes-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 10px 0;
    }

    /* ---- Code Input ---- */
    .code-input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .code-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,.06);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 700;
      font-family: inherit;
      text-align: center;
      letter-spacing: .12em;
      transition: border-color .2s;
      max-width: 200px;
    }
    .code-input:focus { outline: none; border-color: var(--accent); }
    .code-input::placeholder { color: rgba(255,255,255,.25); font-size: 0.9rem; letter-spacing: normal; }

    /* ---- Habitat Flip Cards (Step 3) ---- */
    .habitat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .habitat-card-wrap {
      cursor: pointer;
      height: 170px;
    }
    .habitat-card {
      width: 100%;
      height: 100%;
      position: relative;
      transition: border-color .2s, box-shadow .2s;
    }
    .habitat-card-front, .habitat-card-back {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border: 2px solid var(--border);
    }
    .habitat-card-front {
      background: var(--card-bg);
      gap: 6px;
    }
    .habitat-card-front img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
    }
    .habitat-card-front .hcard-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }
    .habitat-card-back {
      background: linear-gradient(135deg, rgba(98,217,255,.15), rgba(136,243,185,.15));
      border-color: var(--accent);
      text-align: center;
      padding: 14px 10px;
      gap: 8px;
    }
    .habitat-card-back strong { font-size: 13px; color: var(--accent); }
    .habitat-card-back p { font-size: 11.5px; color: var(--text-muted); margin: 0; line-height: 1.5; }
    .habitat-card-wrap.must-flip { animation: cardPulse 1s ease 3; }

    /* ---- מסך בחירת שערים ---- */
    .door-gates-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      max-width: min(920px, 100%);
      margin-inline: auto;
    }
    @media (max-width: 1024px) {
      .door-gates-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
    @media (max-width: 820px) {
      .door-gates-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .door-gates-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 380px) {
      .door-gates-grid { grid-template-columns: 1fr; }
    }
    .door-assigned-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .door-assigned-wrap .door-gate-image {
      width: auto;
      max-width: min(30vw, 210px);
      height: auto;
      max-height: 46vh;
      aspect-ratio: auto;
      object-fit: contain;
    }
    .door-selection-scene {
      width: 100%;
      min-height: calc(100vh - 130px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 0 6px;
      text-align: center;
    }
    .door-selection-hud {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(98,217,255,.28);
      background: rgba(2, 18, 13, 0.38);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }
    .door-selection-hint {
      color: var(--muted);
      font-size: .88rem;
    }
    .door-gate-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 6px 8px;
      border-radius: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: transform .2s;
      box-shadow: none;
      font-family: inherit;
      color: var(--text);
    }
    .door-gate-btn:hover {
      transform: translateY(-3px);
    }
    .door-gate-btn:active { transform: scale(.97); }
    .door-gate-icon { font-size: 2.4rem; line-height: 1; }
    .door-gate-num { font-size: .85rem; font-weight: 900; color: var(--accent); letter-spacing: .04em; }
    .door-gate-label { font-size: .78rem; font-weight: 700; color: var(--muted); text-align: center; line-height: 1.3; }
    .door-gate-image {
      width: 86%;
      max-height: 168px;
      margin-inline: auto;
      aspect-ratio: 7/10;
      object-fit: cover;
      border-radius: 12px;
      display: block;
    }

    .s3-cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }
    @media (max-width: 480px) {
      .s3-cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .s3-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid rgba(98,217,255,.18);
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
      background: #0a1520;
      transition: border-color .18s, box-shadow .18s, translate .18s;
      aspect-ratio: 5/4;
      padding: 0;
    }
    .s3-card:hover {
      translate: 0 -2px;
      border-color: rgba(136,243,185,.55);
      box-shadow: 0 8px 22px rgba(136,243,185,.16);
    }
    .s3-card:active {
      translate: 0 0;
    }
    .s3-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .s3-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .s3-card-face {
      position: relative;
      inset: auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .s3-card-front {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .s3-card-label {
      padding: 6px 8px;
      background: rgba(10,21,32,.88);
      font-size: .78rem;
      font-weight: 700;
      color: #e8f8ff;
      text-align: center;
      border-top: 1px solid rgba(98,217,255,.15);
      line-height: 1.2;
    }
    .s3-card-num {
      position: absolute;
      top: 7px;
      right: 8px;
      background: rgba(136,243,185,.9);
      color: #0a1520;
      font-size: .7rem;
      font-weight: 900;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      z-index: 2;
    }

    .s3-card-back {
      background: rgba(6,19,26,.96);
      border-top: 1px solid rgba(52,230,226,.28);
      padding: 8px 10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
      text-align:right;
      font-size:.72rem;
      line-height:1.35;
      color: var(--muted);
    }
    .s3-card.selected {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 2px rgba(136,243,185,.28), 0 8px 22px rgba(136,243,185,.2);
    }
    @keyframes cardPulse {
      0%,100% { filter: drop-shadow(0 0 4px rgba(255,160,90,.0)); }
      50%      { filter: drop-shadow(0 0 12px rgba(255,160,90,.9)); }
    }
    .stage3-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .stage3-image-frame {
      width: min(400px, 100%);
      margin: 0 auto;
      padding: 8px;
      border-radius: 20px;
      border: 1px solid rgba(124, 246, 255, 0.34);
      background:
        radial-gradient(circle at 22% 18%, rgba(124,246,255,.18), transparent 48%),
        linear-gradient(155deg, rgba(12,24,52,.88), rgba(8,15,34,.96));
      box-shadow:
        0 20px 35px rgba(0,0,0,.42),
        0 0 30px rgba(98,217,255,.16),
        inset 0 0 0 1px rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      max-height: min(280px, 38vh);
      min-height: 100px;
      overflow: hidden;
    }
    .stage3-image-frame img {
      max-width: 100%;
      max-height: min(260px, 36vh);
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center center;
      display: block;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }
    .habitat-hint {
      text-align: center;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
      margin-top: 2px;
      animation: fadeIn .5s ease;
      text-shadow: 0 0 16px rgba(98,217,255,.26);
    }
    .stage3-options-list {
      width: 100%;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .stage3-option-btn {
      width: min(420px, 86%);
      min-height: 36px;
      padding: 6px 14px;
      border-radius: 15px;
      border: 1px solid rgba(176, 222, 255, .45);
      background:
        linear-gradient(145deg, rgba(17,40,79,.95), rgba(9,26,55,.96) 60%, rgba(7,20,43,.98));
      color: var(--text);
      font-size: .88rem;
      font-weight: 700;
      text-align: right;
      font-family: inherit;
      cursor: pointer;
      box-shadow:
        0 10px 22px rgba(0,0,0,.42),
        0 0 18px rgba(98,217,255,.14),
        inset 0 1px 0 rgba(255,255,255,.12);
      transition: transform .16s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
    }
    .stage3-option-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(136,243,185,.72);
      background:
        linear-gradient(145deg, rgba(20,48,93,.98), rgba(10,31,63,.98) 60%, rgba(8,24,50,.98));
      box-shadow:
        0 14px 28px rgba(0,0,0,.45),
        0 0 24px rgba(136,243,185,.24),
        inset 0 1px 0 rgba(255,255,255,.16);
    }
    @media (max-width: 640px) {
      .stage3-option-btn { width: min(92%, 420px); }
      .stage3-layout { gap: 12px; }
    }

    /* ---- Immersive Door Screen ---- */
    /* ===== VAULT DOOR IMMERSIVE SCREENS ===== */
    .vault-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 6px 8px 8px;
      background: linear-gradient(160deg, rgba(0,18,12,0.90), rgba(0,30,20,0.86));
      border: 1px solid rgba(0,232,180,0.18);
      border-radius: 22px;
      position: relative;
      overflow: visible;
      max-width: min(360px, 56%);
      margin-inline: auto;
    }
    .vault-screen::before { content:none; }
    .vault-eyebrow {
      font-size: .72rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: .75;
    }
    .vault-lock {
      font-size: 4rem;
      animation: doorPulse 2.4s ease-in-out infinite;
      filter: drop-shadow(0 0 28px rgba(98,217,255,.65)) drop-shadow(0 0 8px rgba(136,243,185,.4));
      line-height: 1;
    }
    .vault-lock.vault-open {
      animation: bounceIn .55s ease forwards;
      filter: drop-shadow(0 0 36px rgba(136,243,185,.85));
    }
    .vault-title {
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      letter-spacing: .02em;
    }
    .vault-subtitle {
      font-size: .83rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: -8px;
    }
    /* Clue cards row */
    .vault-clues {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .vault-clue {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(98,217,255,.22);
      border-radius: 14px;
      padding: 8px 14px;
      min-width: 66px;
    }
    .vault-clue-label {
      font-size: .65rem;
      letter-spacing: .1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .vault-clue-val {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1.1;
    }
    .vault-clue.missing .vault-clue-val { color: var(--danger); font-size: 1.1rem; }
    /* Digit inputs */
    .vault-digits {
      display: flex;
      gap: 12px;
      align-items: center;
      direction: ltr;
    }
    .vault-entry-tools {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .vault-digits-toggle {
      padding: 8px 12px;
      font-size: .84rem;
      border-radius: 10px;
    }
    .vault-digits-panel {
      width: min(380px, 100%);
      border-radius: 12px;
      border: 1px solid rgba(98,217,255,.3);
      background: rgba(5, 17, 32, .72);
      padding: 10px 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,.2);
    }
    .vault-digits-panel-title {
      color: var(--accent-2);
      font-weight: 700;
      font-size: .84rem;
      margin-bottom: 6px;
    }
    .vault-digits-list {
      list-style: none;
      display: grid;
      gap: 5px;
      font-size: .88rem;
      color: #d9e9ff;
    }
    .vault-digit {
      width: 50px;
      height: 58px;
      background: rgba(98,217,255,.12);
      border: 2.5px solid rgba(98,217,255,.4);
      border-radius: 16px;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--accent);
      text-align: center;
      caret-color: var(--accent);
      font-family: inherit;
      transition: border-color .2s, box-shadow .2s;
    }
    .vault-digit:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(98,217,255,.2), 0 0 18px rgba(98,217,255,.3);
    }
    .vault-digit-sep {
      font-size: 2rem;
      color: rgba(98,217,255,.4);
      font-weight: 200;
      line-height: 1;
    }
    /* Unlock button */
    .vault-btn {
      margin-top: 4px;
      padding: 11px 38px;
      font-size: 1rem;
      font-weight: 800;
      font-family: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0a1520;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(98,217,255,.3);
    }
    .vault-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(98,217,255,.5); }
    .vault-btn:active { transform: scale(.97); }
    /* Shake on wrong */
    .vault-shake { animation: wrongShake .5s ease; }
    /* Already-open state */
    .vault-open-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn .5s ease;
    }
    .vault-open-icon { font-size: 5.5rem; animation: bounceIn .6s ease; }
    .vault-warning {
      color: var(--danger);
      font-weight: 700;
      text-align: center;
      font-size: .9rem;
    }
    /* Backward compat kept for step 3 / other screens */
    .door-immersive {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 24px;
      background: radial-gradient(ellipse at center, rgba(98,217,255,.07) 0%, transparent 70%);
      border-radius: 22px;
    }
    .door-submit-btn {
      margin-top: 8px;
      padding: 14px 44px;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0d1a26;
      border: none;
      border-radius: 40px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      font-family: inherit;
    }
    .door-submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(98,217,255,.35); }
    .door-unlock-success {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeIn .5s ease;
    }
    .door-unlock-icon { font-size: 5rem; animation: bounceIn .6s ease; }
    @keyframes bounceIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .door-shake { animation: wrongShake .5s ease; }
    .vault-digits.success-glow {
      border-radius: 16px;
      box-shadow: 0 0 0 2px rgba(136,243,185,.45), 0 0 24px rgba(136,243,185,.35);
      animation: correctPulse .7s ease;
    }
    .vault-success-msg {
      margin-top: 10px;
      text-align: center;
      color: var(--accent-2);
      font-weight: 800;
      min-height: 1.2em;
    }

    /* ---- DYK Screen ---- */
    .dyk-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      text-align: center;
      background: linear-gradient(160deg, rgba(10,30,46,.95), rgba(7,18,30,.97)) !important;
      border: 1.5px solid rgba(136,243,185,.28) !important;
      box-shadow: 0 8px 40px rgba(0,0,0,.55), 0 0 30px rgba(136,243,185,.08) !important;
    }
    .dyk-image {
      width: 100%;
      max-width: 560px;
      max-height: min(360px, 52vh);
      aspect-ratio: unset;
      display: block;
      margin-inline: auto;
      border-radius: 18px;
      object-fit: contain;
      background: rgba(5, 16, 24, 0.55);
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }
    .dyk-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0d1a26;
      font-weight: 800;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 0.85rem;
      letter-spacing: .05em;
    }
    .dyk-text {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.7;
      max-width: 520px;
    }

    /* ---- Step 5: Matching Game ---- */
    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    .match-col-title {
      text-align: center;
      font-weight: 800;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 8px;
    }
    .match-col-nature { background: rgba(136,243,185,.18); color: var(--accent-2); }
    .match-col-tech   { background: rgba(98,217,255,.12); color: var(--accent); }
    .match-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: rgba(255,255,255,.04);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      transition: border-color .2s, background .2s, transform .12s, opacity .3s;
      margin-bottom: 8px;
    }
    .match-card:hover:not(.matched) { border-color: var(--accent); background: rgba(98,217,255,.07); transform: translateY(-2px); }
    .match-card.selected { border-color: var(--accent-2); background: rgba(136,243,185,.1); box-shadow: 0 0 0 3px rgba(136,243,185,.2); }
    .match-card.matched  { opacity: .55; cursor: default; pointer-events: none; border-color: rgba(120,255,180,.4); }
    .match-card.wrong-flash { animation: wrongShake .45s ease; }
    .match-card.correct-flash { animation: correctPulse .5s ease; }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      60% { transform: translateX(5px); }
    }
    @keyframes correctPulse {
      0% { box-shadow: 0 0 0 0 rgba(120,255,180,.7); }
      60% { box-shadow: 0 0 0 14px rgba(120,255,180,0); }
      100% { box-shadow: none; }
    }
    .match-img {
      width: 48px; height: 48px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.06);
      flex-shrink: 0;
    }
    .score-display {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent-2);
      margin-bottom: 12px;
    }

    /* ---- Step 6: Hidden Biomimicry Secrets ---- */
    .step6-shell {
      background: transparent;
      border-radius: 14px;
      border: none;
      box-shadow: none;
      padding: clamp(8px, 1.4vw, 14px);
      overflow: hidden;
      position: relative;
    }
    .step6-shell.zoom-90-active {
      overflow: visible;
      max-width: 1220px;
    }
    .step6-shell::after {
      content: "";
      position: absolute;
      inset: -22%;
      background: none;
      pointer-events: none;
      animation: none;
    }
    @keyframes step6Aura {
      0%, 100% { transform: scale(1); opacity: .6; }
      50% { transform: scale(1.12); opacity: .9; }
    }
    .step6-choice-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }
    .step6-choice-card {
      background: rgba(7,14,34,.76);
      border: 1px solid rgba(125,237,255,.26);
      border-radius: 18px;
      padding: 10px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .step6-choice-card:hover,
    .step6-choice-card:focus-visible {
      transform: translateY(-3px) scale(1.015);
      border-color: rgba(136,243,185,.74);
      box-shadow: 0 0 0 2px rgba(136,243,185,.26), 0 14px 30px rgba(31,193,255,.25);
      outline: none;
      animation: step6ChoicePulse 1.3s ease;
    }
    @keyframes step6ChoicePulse {
      0% { box-shadow: 0 0 0 0 rgba(116,248,255,.45); }
      100% { box-shadow: 0 0 0 16px rgba(116,248,255,0); }
    }
    .step6-choice-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      display: block;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .step6-game-wrap { position: relative; z-index: 1; display: grid; gap: 14px; }
    .step6-controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2px;
    }
    .step6-zoom-toggle {
      border: 1.5px solid rgba(136, 227, 255, .65);
      background: rgba(6, 24, 52, .88);
      color: #d8f4ff;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: .92rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .12s;
    }
    .step6-zoom-toggle:hover {
      background: rgba(20, 60, 100, .95);
      border-color: rgba(136, 243, 185, .8);
      transform: scale(1.04);
    }
    .step6-image-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .step6-image-lightbox-backdrop {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: rgba(2, 8, 6, 0.88);
      backdrop-filter: blur(8px);
      cursor: pointer;
    }
    .step6-image-lightbox-inner {
      position: relative;
      z-index: 2;
      width: min(96vw, 1200px);
      max-width: 96vw;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }
    .step6-image-lightbox-inner img {
      max-width: 94vw;
      max-height: min(86vh, 900px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      border: 1.5px solid rgba(0, 200, 140, 0.45);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.65);
      pointer-events: auto;
    }
    .step6-image-lightbox-close {
      pointer-events: auto;
      align-self: center;
      border: 1px solid rgba(255, 160, 160, 0.55);
      background: rgba(160, 35, 35, 0.92);
      color: #fff;
      border-radius: 999px;
      padding: 8px 22px;
      font-weight: 800;
      cursor: pointer;
      font-size: 0.86rem;
      font-family: inherit;
    }
    .step5-victory-code {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      text-align: center;
      color: var(--accent-2);
      margin: 12px 0;
      text-shadow: 0 0 20px rgba(98, 217, 255, 0.35);
    }
    .step5-victory-score {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #bdeaff;
      margin: 8px 0;
    }
    .step6-scene-viewport {
      width: min(780px, 100%);
      margin-inline: auto;
      justify-self: center;
    }
    .step6-search-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(124px, 168px);
      gap: 24px;
      align-items: start;
      direction: ltr;
      width: 100%;
      max-width: min(1180px, 100%);
      margin-inline: auto;
    }
    .step6-search-layout.step6-search-layout--zoom-open {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      gap: 0;
      width: 100%;
      max-width: min(1180px, 100%);
      margin-inline: auto;
    }
    .step6-search-layout.step6-search-layout--zoom-open .step6-items-side {
      width: min(168px, 20vw);
    }
    .step6-scene--zoom-panel {
      width: 100%;
      max-height: min(86vh, 820px);
    }
    .step6-fullscreen-zoom {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.72);
    }
    .step6-fullscreen-zoom-backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
      pointer-events: auto;
    }
    .step6-fullscreen-zoom-panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 1200px);
      max-width: 92vw;
      max-height: 90vh;
      height: auto;
      overflow: hidden;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(6, 18, 30, 0.92);
      border-radius: 20px;
      border: 1px solid rgba(100, 220, 200, 0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,.65);
      padding: 12px;
      box-sizing: border-box;
    }
    .step6-fullscreen-zoom-toolbar {
      position: relative;
      z-index: 50;
      display: flex;
      justify-content: center;
      width: 100%;
      padding-bottom: 6px;
      background: linear-gradient(180deg, rgba(2, 8, 12, 0.96), rgba(2, 8, 12, 0));
    }
    .step6-fullscreen-zoom-body {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      box-sizing: border-box;
    }

    .step6-scene--zoom-panel {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 100%;
      max-height: calc(90vh - 80px);
      height: auto;
      flex-shrink: 1;
      margin-inline: auto;
    }
    .step6-fullscreen-zoom-panel .step6-search-layout--zoom-open {
      display: block;
      width: 100%;
      max-width: 100%;
      height: 100%;
    }
    .step6-fullscreen-zoom-panel .step6-scene-viewport {
      width: 100%;
      max-width: 100%;
    }
    .step6-fullscreen-zoom-panel .step6-scene--zoom-panel {
      margin-inline: auto;
      margin-block: auto;
      width: min(100%, calc((90vh - 80px) * 16 / 9));
      max-height: calc(90vh - 80px);
    }
    .step6-fullscreen-zoom-panel .step6-items-side {
      display: none;
    }
    .step6-zoom-inner-layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      height: 100%;
    }
    .step6-zoom-scene-wrap {
      flex: 1 1 0;
      min-width: 0;
    }
    .step6-items-side--in-zoom {
      display: grid !important;
      flex: 0 0 auto;
      width: clamp(100px, 15vw, 160px);
      max-height: calc(90vh - 100px);
      overflow-y: auto;
      position: sticky;
      top: 0;
    }
    .step6-items-side {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: start;
      direction: ltr;
      position: sticky;
      top: 10px;
      align-self: start;
    }
    .step6-item-box {
      min-height: 86px;
      background: linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.02));
      border: 1px solid rgba(125,237,255,.34);
      border-radius: 14px;
      padding: 9px;
      text-align: center;
      display: grid;
      gap: 7px;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
