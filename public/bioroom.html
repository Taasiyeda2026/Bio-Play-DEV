    case 'door_1_dyk':
    case 'door_2_dyk':
      return BG(10);
    case 'step_8_cipher':
    case 'final_screen':
      return BG(11);
    default:
      return BG(1);
  }
}

function applyScreenBackground(screenName) {

  document.documentElement.style.setProperty('--screen-bg-image', backgroundValue);
}

function runDoorSuccessCinematic(kind, onComplete) {
  const baseTheme = DOOR_SUCCESS_THEMES[kind] || DOOR_SUCCESS_THEMES.door1;
  const theme = REDUCED_MOTION
    ? {
        ...baseTheme,
        pauseMs: Math.round((baseTheme.pauseMs || 420) * 0.5),
        awakeningMs: Math.round((baseTheme.awakeningMs || 560) * 0.5),
        risingMs: Math.round((baseTheme.risingMs || 980) * 0.5),
        peakMs: Math.round((baseTheme.peakMs || 560) * 0.5),
        fadeMs: Math.round((baseTheme.fadeMs || 520) * 0.5),
        doorOpenMs: Math.round((baseTheme.doorOpenMs || 1140) * 0.7),
        particles: Math.max(16, Math.round((baseTheme.particles || 48) * 0.35)),
      }
    : baseTheme;
  const overlay = document.getElementById('door-success-overlay');
  const stage = document.getElementById('door-success-stage');
  const title = document.getElementById('door-success-title');
  const subtitle = document.getElementById('door-success-subtitle');
  const door = document.getElementById('door-success-door');
  const particlesLayer = document.getElementById('door-success-particles');
  const runesWrap = document.getElementById('door-success-runes-wrap');
  const ringsWrap = document.getElementById('door-success-rings-wrap');
  const beam = document.getElementById('door-success-beam');
  const flash = document.getElementById('door-success-flash');

  if (!overlay || !stage || !title || !subtitle || !door || !particlesLayer) {
    if (typeof onComplete === 'function') onComplete();
    return;
  }

  if (runesWrap) runesWrap.classList.remove('active');
  if (ringsWrap) ringsWrap.classList.remove('fire');
  if (beam) beam.classList.remove('fire');
  if (flash) flash.classList.remove('fire');

  overlay.dataset.tier = theme.tier;
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden', 'false');
  stage.textContent = theme.stage;
  title.textContent = theme.title;
  subtitle.textContent = theme.subtitle;
  particlesLayer.innerHTML = '';
  door.classList.remove('open');
  overlay.dataset.phase = 'idle';
  door.style.setProperty('--door-open-ms', `${theme.doorOpenMs}ms`);
  const timers = [];
  const queue = (fn, ms) => timers.push(setTimeout(fn, ms));
  const cleanup = () => {
    timers.forEach((id) => clearTimeout(id));
    overlay.classList.remove('active', 'exiting');
    overlay.setAttribute('aria-hidden', 'true');
    overlay.dataset.phase = 'idle';
    door.classList.remove('open');
    particlesLayer.innerHTML = '';
    if (runesWrap) runesWrap.classList.remove('active');
    if (ringsWrap) ringsWrap.classList.remove('fire');
    if (beam) beam.classList.remove('fire');
    if (flash) flash.classList.remove('fire');
    if (typeof onComplete === 'function') onComplete();
  };

  let at = 0;
  queue(() => { overlay.dataset.phase = 'pause'; }, at);
  at += Number(theme.pauseMs || 420);
  queue(() => {
    overlay.dataset.phase = 'awakening';
    if (runesWrap && !REDUCED_MOTION) runesWrap.classList.add('active');
  }, at);
  at += Number(theme.awakeningMs || 560);
  queue(() => { overlay.dataset.phase = 'rising'; }, at);
  queue(() => { spawnDoorParticles(particlesLayer, Math.max(12, Math.round(theme.particles * 0.45)), theme.tier); }, at + 120);
  at += Number(theme.risingMs || 980);
  queue(() => {
    overlay.dataset.phase = 'peak';
    spawnDoorParticles(particlesLayer, theme.particles, theme.tier);
    if (!REDUCED_MOTION && typeof window.triggerMagicBurst === 'function') {
      window.triggerMagicBurst(window.innerWidth / 2, window.innerHeight / 2);
    }
  }, at);
  at += Number(theme.peakMs || 560);
  queue(() => {
    overlay.dataset.phase = 'opening';
    door.classList.add('open');
    spawnDoorParticles(particlesLayer, Math.max(8, Math.round(theme.particles * 0.35)), theme.tier);
    if (!REDUCED_MOTION) {
      if (ringsWrap) ringsWrap.classList.add('fire');
      if (beam) beam.classList.add('fire');
      if (flash) flash.classList.add('fire');
    }
  }, at);
  at += Number(theme.doorOpenMs || 1140);
  queue(() => {
    overlay.dataset.phase = 'fading';
    overlay.classList.add('exiting');
  }, at);
  at += Number(theme.fadeMs || 520);
  queue(cleanup, at);
}

function spawnDoorParticles(layer, count, tier) {
  const paletteByTier = {
    door1: ['#5EE7E0', '#7FD8FF', '#A88BFF', '#F3F8FF'],
    door2: ['#5EE7E0', '#7FD8FF', '#A88BFF', '#F3F8FF', '#F6E7B7'],
    final: ['#5EE7E0', '#7FD8FF', '#A88BFF', '#F3F8FF', '#F6E7B7', '#C9DCF5'],
  };
  const palette = paletteByTier[tier] || paletteByTier.door1;
  for (let i = 0; i < count; i++) {
    const isStar = Math.random() < 0.28;
    const p = document.createElement('span');
    p.className = isStar ? 'door-success-particle door-success-star' : 'door-success-particle';
    const size = (2.2 + Math.random() * (tier === 'final' ? 6.8 : 5.2)).toFixed(2);
    const x = `${44 + Math.random() * 12}%`;
    const y = `${58 + Math.random() * 18}%`;
    const dx = `${(-180 + Math.random() * 360).toFixed(1)}px`;
    const dy = `${(-160 - Math.random() * (tier === 'final' ? 260 : 180)).toFixed(1)}px`;
    const dur = (1.2 + Math.random() * (tier === 'final' ? 1.8 : 1.2)).toFixed(2);
    p.style.setProperty('--p-size', `${size}px`);
    p.style.setProperty('--p-x', x);
    p.style.setProperty('--p-y', y);
    p.style.setProperty('--p-dx', dx);
    p.style.setProperty('--p-dy', dy);
    p.style.setProperty('--p-dur', `${dur}s`);
    p.style.setProperty('--p-color', palette[Math.floor(Math.random() * palette.length)]);
    p.style.animationDelay = `${(Math.random() * 0.5).toFixed(2)}s`;
    layer.appendChild(p);
    setTimeout(() => p.remove(), (Number(dur) + 0.75) * 1000);
  }
}

function escapeHTML(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setScreen(html) {
  const el = document.getElementById("game-screen");
  if (el) {
    el.innerHTML = html;
    el.classList.remove('screen-transitioning');
    void el.offsetWidth;
    el.classList.add('screen-transitioning');
  }
  const isStep6 = document.getElementById('app')?.classList.contains('screen-step6-wide');
  if (isStep6) {
    setTimeout(applyAutoScale, 300);
  } else {
    requestAnimationFrame(applyAutoScale);
  }
}

function applyAutoScale() {
  const app = document.getElementById('app');
  const gs  = document.getElementById('game-screen');
  if (!app || !gs) return;

  app.style.zoom = '';
  app.style.maxHeight = 'none';
  gs.style.maxHeight  = 'none';
  gs.style.overflow   = 'auto';
  gs.style.overflowX  = 'hidden';

  requestAnimationFrame(() => {
    const availH = window.innerHeight - 24;
    const appH   = app.offsetHeight;
    if (appH <= availH) return;
    const scale = Math.max(0.45, availH / appH);
    app.style.zoom = scale;
  });
}

function applyScreenScaleClass(screenName) {
  const app = document.getElementById('app');
  if (!app) return;
  const playerFlowScreens = [
    'name_entry',
    'waiting_room',
    'door_selection',
    'step_1_identification',

    'door_1',
  ];

    'door_selection',
    'step_1_identification',
    'step_2_secret',
    'step_3_habitat',
    'door_1',
  ];

  app.classList.remove('screen-zoom-60', 'screen-zoom-70', 'screen-zoom-115', 'screen-door-selection', 'screen-step8', 'screen-fit-70', 'screen-player-flow', 'screen-step6-wide');

function canUnlockDoor1() {
  const e = gameState.enabledSteps;
  if (e.includes(2) && !gameState.codes.codeStep2) return false;
  if (e.includes(3) && !gameState.codes.codeStep3) return false;
  return Boolean(gameState.codes.codeStep1);
}

function unlockDoor1() {
  if (!canUnlockDoor1()) {
    showError("לא נאספו כל הקודים הדרושים לפתיחת הדלת.");
    return;
  }
  gameState.progress.door1Unlocked = true;
  gameState.progress.door1DykViewed = false;
  saveGameState();
  showSuccess("הדלת נפתחה! כל הכבוד 🎉 ממשיכים...");
  let finished = false;
  const continueAfterUnlock = () => {
    if (finished) return;
    finished = true;
    setUiBusy(false);
    goToScreen(getNextScreen("door_1"));
  };
  // Fallback: if cinematic overlay gets stuck, still continue forward.
  const fallbackTimer = setTimeout(continueAfterUnlock, 9000);
  runDoorSuccessCinematic('door1', () => {
    clearTimeout(fallbackTimer);
    continueAfterUnlock();
  });
}

   STEP 5 LOGIC – התאמת טבע–המצאה
   ============================================================ */

function solveStep5(userMatches, payload = null) {
  if (!gameState.progress.door1Unlocked) {
    showError("אי אפשר להגיע לכאן בלי לפתוח דלת 1.");
    return;
  }
  gameState.answers.step5Matches  = userMatches;
  gameState.progress.step5Solved  = true;
  const payloadDigits = Array.isArray(payload?.digits) ? payload.digits : [];
  const digit1 = String(payloadDigits[0] ?? gameData.step5.secretDigits?.[0] ?? '').trim();
  const digit2 = String(payloadDigits[1] ?? gameData.step5.secretDigits?.[1] ?? '').trim();
  gameData.step5.secretDigits = [digit1, digit2];
  gameState.codes.step5Digit1     = digit1 || null;
  gameState.codes.step5Digit2     = digit2 || null;
  let p5 = 0;
  if (payload && Number.isFinite(Number(payload.scoreAward))) {
    p5 = Number(payload.scoreAward);
    gameState.player.score += p5;
    apiPost('gamescore', {
      name:  gameState.player.name,
      score: String(gameState.player.score),
      step:  'step5',
    });
  } else {
    const result = scoreStep('step5', STEP_SCORES.step5);
    p5 = result.pts;
  }
  gameState.ui.step5VictoryPts = p5;
  saveGameState();
  goToScreen('step_5_nature_invention_match');
}

}

function buildDoor2Code() {
  const d1    = gameState.codes.step5Digit1;
  const d2    = gameState.codes.step5Digit2;
  const count = gameState.codes.step6ElementCount;
  if (d1 === null || d2 === null || count === null) return null;
  return `${d1}${d2}${count}`;
}

function prepareDoor2Code() {
  const code = buildDoor2Code();
  if (!code) {
    showError("אין מספיק נתונים לבניית הקוד.");
    return null;

  gameState.codes.door2Code = code;

function unlockDoor2(submittedCode) {
  if (gameState.progress.door2Unlocked) {
    setUiBusy(false);
    goToScreen(getNextScreen('door_2'));

  const expectedCode = getActiveDoor2Code();
  if (!expectedCode) { setUiBusy(false); showError("שגיאה בבניית קוד הדלת."); return; }
  if (String(submittedCode).trim() !== String(expectedCode)) {

   API HELPERS  – Google Apps Script או מצב מקומי (דמו מנהל)

const APPS_URL = window.BIOPLAY_BACKEND_URL || "https://script.google.com/macros/s/AKfycbyb0n7HMDLAJih6De3NJ7xLcq9Vi4hQZNnBQsKNWolhYHZba3cxJTifi_cnNstGdKoOFA/exec";
const _roomQs    = new URLSearchParams(location.search);
const ROOM_ID    = _roomQs.get('room') || '';
const GAME_MODE = _roomQs.get('mode') === 'local' ? 'local' : 'server';
const GAME_MODE_LOCAL = GAME_MODE === 'local';

function normalizeGameStatus(rawStatus) {
  return String(rawStatus || '').trim().toLowerCase();
}

function isGameActiveStatus(rawStatus) {
  const normalized = normalizeGameStatus(rawStatus);
  return normalized === 'active' || normalized === 'started';
}

function buildIndexUrl(roomId = ROOM_ID) {
  const rid = String(roomId || '').trim();
  const q = new URLSearchParams();
  if (rid) q.set('room', rid);
  if (GAME_MODE_LOCAL) q.set('mode', 'local');
  return `../index.html${q.toString() ? `?${q.toString()}` : ''}`;
}

(function guardStudentEntryFromIndex() {
  if (GAME_MODE_LOCAL) return;
  const rid = String(ROOM_ID || '').trim();
  if (!rid) {
    location.replace(buildIndexUrl(''));
    return;
  }
  try {
    const raw = sessionStorage.getItem('bioplay_student_entry');
    const o = raw ? JSON.parse(raw) : null;
    const ttlMs = 8 * 60 * 60 * 1000;
    const ok = o && String(o.room || o.roomId || '') === rid && (Date.now() - (Number(o.t) || 0)) < ttlMs;
    if (!ok) location.replace(buildIndexUrl(rid));
  } catch (_) {
    location.replace(buildIndexUrl(rid));
  }
})();

window.goToLobbyFromGame = function() {
  location.href = buildIndexUrl(ROOM_ID);
};

const BIOPLAY_INTERNAL_LS_KEY = 'bioplay_internal_v1';

function _internalLoad() {
  try {
    const raw = localStorage.getItem(BIOPLAY_INTERNAL_LS_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) {
    return null;
  }
}

function _internalSave(st) {
  try { localStorage.setItem(BIOPLAY_INTERNAL_LS_KEY, JSON.stringify(st)); } catch (_) {}
}

function generateParticipantId() {
  try {
    if (window.crypto?.randomUUID) return window.crypto.randomUUID();
  } catch (_) {}
  const ts = Date.now().toString(36);
  const rnd = Math.random().toString(36).slice(2, 10);
  return `pid_${ts}_${rnd}`;
}

function ensureParticipantId() {
  const current = String(gameState?.player?.participantId || '').trim();
  if (current) return current;
  const next = generateParticipantId();
  gameState.player.participantId = next;
  return next;
}

async function apiPost(action, data) {
  const payload = { ...(data || {}) };
  if (action === 'gamejoin' || action === 'gamescore') {
    const participantId = ensureParticipantId();
    payload.participantId = participantId;
    if (!payload.name) payload.name = gameState.player.name;
  }
  if (GAME_MODE_LOCAL) {
    const st = _internalLoad() || {
      status: 'waiting',
      startedAt: 0,
      doorsCount: 5,
      selectedDoors: [],
      enabledSteps: [1, 2, 3, 4, 5, 6],
      players: [],
    };
    const name = String(payload.name || '').trim();
    const participantId = String(payload.participantId || '').trim();
    if (action === 'gamejoin' && name && participantId) {
      if (String(st.status || '').toLowerCase() !== 'active' && String(st.status || '').toLowerCase() !== 'started') return;
      let pl = st.players.find((p) => String(p.participantId || '').trim() === participantId);
      if (!pl) {
        pl = {
          participantId,
          name,
          score: 0,
          lastStep: 'joined',
          completed: false,
          completedAt: '',
          startTime: Date.now(),
        };
        st.players.push(pl);
      }
      pl.name = name;
      _internalSave(st);
    }
    if (action === 'gamescore' && name && participantId) {
      if (String(st.status || '').toLowerCase() !== 'active' && String(st.status || '').toLowerCase() !== 'started') return;
      let pl = st.players.find((p) => String(p.participantId || '').trim() === participantId);
      if (!pl) {
        pl = {
          participantId,
          name,
          score: 0,
          lastStep: '',
          completed: false,
          completedAt: '',
          startTime: Date.now(),
        };
        st.players.push(pl);
      }
      pl.name = name;
      const sc = Number(payload.score);
      if (Number.isFinite(sc)) pl.score = sc;
      if (payload.step && payload.step !== 'hint_used') pl.lastStep = String(payload.step);
      if (payload.door) pl.door = String(payload.door);
      if (payload.hintsUsed != null) pl.hintsUsed = Math.max(pl.hintsUsed || 0, Number(payload.hintsUsed) || 0);
      if (String(payload.completed || '').toLowerCase() === 'true') pl.completed = true;
      if (pl.completed && !pl.completedAt) pl.completedAt = new Date().toISOString();
      _internalSave(st);
    }
    return;
  }
  try {
    const params = new URLSearchParams({ action, roomId: ROOM_ID, mode: GAME_MODE, ...payload });
    await fetch(APPS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params.toString(),
    });
  } catch (e) { /* offline – ignore */ }
}

async function apiGet(action, extra = {}) {
  if (GAME_MODE_LOCAL && action === 'gamestatus') {
    const st = _internalLoad();
    const active = Boolean(st && isGameActiveStatus(st.status));
    return {
      ok: true,
      roomId: ROOM_ID,
      status: active ? 'active' : 'waiting',
      doorsCount: st?.doorsCount || 5,
      selectedDoors: Array.isArray(st?.selectedDoors) ? st.selectedDoors : [],
      enabledSteps: Array.isArray(st?.enabledSteps) ? st.enabledSteps : [1, 2, 3, 4, 5, 6],
      participantsCount: Number(st?.doorsCount || st?.participantsCount || 0) || 0,
      groupSizes: st?.groupSizes && typeof st.groupSizes === 'object' ? st.groupSizes : {},
      groupAssignments: Array.isArray(st?.groupAssignments) ? st.groupAssignments : [],
      startedAtMs: Number(st?.startedAt || 0) || 0,
    };
  }
  const actionsToTry = action === 'gamestatus' ? ['gamestatus', 'gameStatus', 'status'] : [action];
  let lastError = null;
  for (const actionName of actionsToTry) {
    try {
      const qs = new URLSearchParams({ action: actionName, roomId: ROOM_ID, mode: GAME_MODE, ...extra });
      const requestUrl = `${APPS_URL}?${qs}`;
      const r = await fetch(requestUrl, {
        method: 'GET',
        cache: 'no-store',
      });
      const raw = await r.text();
      let parsed = null;
      try { parsed = raw ? JSON.parse(raw) : null; } catch (_) { parsed = null; }
      if (!r.ok) throw new Error(`HTTP ${r.status} (${actionName})`);
      if (parsed && parsed.ok === false) throw new Error(String(parsed.error || parsed.message || `API_ERROR (${actionName})`));
      if (action === 'gamestatus') {
        console.info('[student/game] gamestatus fetch ok', {
          roomId: ROOM_ID,
          mode: GAME_MODE,
          action: actionName,
          status: parsed?.status || null,
        });
      }
      return parsed;
    } catch (err) {
      lastError = err;
      if (action === 'gamestatus') {
        console.warn('[student/game] gamestatus fetch failed', {
          roomId: ROOM_ID,
          mode: GAME_MODE,
          action: actionName,
          appsUrl: APPS_URL,
          error: String(err?.message || err || 'unknown'),
        });
      }
    }
  }
  return null;
}

/* ============================================================
   SCORING HELPER  (מחשב נקודות לפי מספר ניסיונות שגויים)
   ============================================================ */

/**
 * מחזיר: { pts, multiplier, wrong }
 *   wrong=0 → מכפיל 1.0  (ניקוד מלא)
 *   wrong=1 → מכפיל 0.5  (חצי ניקוד – ניסיון שני)
 *   wrong≥2 → מכפיל 0    (אפס ניקוד – ניסיון שלישי+)
 */
function scoreStep(stepKey, maxPts) {
  const wrong      = gameState._attempts[stepKey] || 0;
  const multiplier = wrong === 0 ? 1.0 : wrong === 1 ? 0.5 : 0.0;
  const pts        = Math.round(maxPts * multiplier);
  gameState.player.score += pts;
  apiPost('gamescore', {
    name:  gameState.player.name,
    score: String(gameState.player.score),
    step:  stepKey,
  });
  return { pts, multiplier, wrong };
}

/** מחזיר טקסט ניקוד לתוך הודעת ההצלחה */
function scoreSuffix(pts, wrong) {
  if (wrong === 0) return `✨ +${pts} נקודות`;
  if (wrong === 1) return `⚡ +${pts} נקודות (חצי ניקוד – ניסיון שני)`;
  return `⚠️ +0 נקודות (ניסיון שלישי+)`;
}

/** הודעת שגיאה לפי מספר ניסיונות שגויים שנצברו (AFTER increment) */
function attemptsErrorMsg(stepKey) {
  const count = gameState._attempts[stepKey] || 0;
  /* count=1: שגיאה ראשונה – הניסיון הבא יזכה בחצי ניקוד */
  if (count === 1) return "לא נכון ❌ — שגיאה ראשונה! תשובה נכונה בניסיון הבא תזכה בחצי ניקוד בלבד.";
  /* count=2: שגיאה שנייה – כבר לא יזכה בניקוד */
  if (count === 2) return "לא נכון ⚠️ — שגיאה שנייה. פתרון נכון מכאן לא יזכה בניקוד.";
  /* count≥3: ממשיכים לנסות, ללא ניקוד */
  return "לא נכון 😔 — נסו שוב. לא ייזקף ניקוד על שאלה זו.";
}

function getActiveParticipantAssignment() {
  const participantId = ensureParticipantId();
  const assignments = Array.isArray(gameState.groupAssignments) ? gameState.groupAssignments : [];
  const byParticipantId = assignments.find((assignment) => String(assignment?.participantId || '').trim() === participantId);
  if (byParticipantId) return byParticipantId;
  const byName = assignments.find((assignment) => {
    const expected = String(assignment?.playerName || assignment?.name || '').trim();
    return expected && expected === String(gameState.player.name || '').trim();
  });
  return byName || null;
}

function getActiveHabitat() {
  const assignment = getActiveParticipantAssignment();
  if (assignment?.habitat) return assignment.habitat;
  const participantId = ensureParticipantId();
  const total = Number(gameState.participantsCount || 0);
  if (total < 1) return gameState.activeGroupHabitat || HYBRID_HABITATS[0];
  let hash = 0;
  const seed = `${participantId}_${ROOM_ID}`;
  for (let i = 0; i < seed.length; i++) {
    hash = (hash * 31 + seed.charCodeAt(i)) & 0x7fffffff;
  }
  const slot = (hash % total) + 1;
  let cursor = 0;
  for (const habitat of HYBRID_HABITATS) {
    cursor += Number(gameState.groupSizes?.[habitat] || 0);
    if (slot <= cursor) return habitat;
  }
  return gameState.activeGroupHabitat || HYBRID_HABITATS[0];
}

    const isConnected = video.isConnected;
    const parentConnected = Boolean(video.parentElement?.isConnected);
    const rect = video.getBoundingClientRect();
    const mediaRect = mediaEl?.getBoundingClientRect?.() || null;
    const styles = window.getComputedStyle(video);
    const overlayStyles = window.getComputedStyle(overlay);
    dbgInfo('[narration] video state', {
      stage,
      ...extra,
      baseURI: document.baseURI,
      currentPath: window.location.pathname,
      srcAttr: video.getAttribute('src'),
      currentSrc: video.currentSrc,
      readyState: video.readyState,
      networkState: video.networkState,
      paused: video.paused,
      muted: video.muted,
      volume: video.volume,
      currentTime: video.currentTime,
      duration: video.duration,
      hasVideoEl: true,
      isConnected,
      parentConnected,
      hasOffsetParent: Boolean(video.offsetParent),
      videoRect: { width: rect.width, height: rect.height, top: rect.top, left: rect.left },
      mediaRect: mediaRect ? { width: mediaRect.width, height: mediaRect.height, top: mediaRect.top, left: mediaRect.left } : null,
      computed: {
        display: styles.display,
        visibility: styles.visibility,
        opacity: styles.opacity,
        zIndex: styles.zIndex,
      },
      overlayComputed: {
        display: overlayStyles.display,
        visibility: overlayStyles.visibility,
        opacity: overlayStyles.opacity,
        zIndex: overlayStyles.zIndex,
      },
    });
  }

  function stopAllMedia() {
    try {
      if (videoWatchdog) clearTimeout(videoWatchdog);
      videoWatchdog = null;
    } catch (_) {}
    try {
      video?.pause();
      if (video) {
        video.removeAttribute('src');
        video.load();
      }
    } catch(e) {}
    try {
      if (audio) {
        audio.pause();
        audio.src = '';
        audio.load();
      }
    } catch(e) {}
  }

  function finishAndStart() {
    if (resolved) return;
    resolved = true;
    clearInterval(intervalId);
    stopAllMedia();
    overlay.remove();
    goToScreen('door_selection');
  }

  function runCountdown(keepVideo = false) {
    if (resolved || countdownStarted) return;
    countdownStarted = true;
    if (!keepVideo) {
      if (video) video.style.display = 'none';
      if (loadingEl) loadingEl.style.display = 'none';
    }
    if (numEl) {
      numEl.style.display = 'flex';
      numEl.textContent = 10;
    }

    let sec = 10;
    intervalId = setInterval(() => {
      sec--;
      if (numEl) numEl.textContent = sec;
      if (sec <= 0) finishAndStart();
    }, 1000);
  }

  function startAudioFallback() {
    if (resolved || countdownStarted || audioStarted) return;
    audioStarted = true;
    if (video) video.style.display = 'none';
    if (loadingEl) loadingEl.style.display = 'none';
    try {
      audio = new Audio(resolveRuntimeAsset('assets/audio/narration.m4a'));
    } catch (_) {
      finishAndStart();
      return;
    }
    audio.addEventListener('ended', runCountdown, { once: true });
    audio.addEventListener('error', () => {
      finishAndStart();
    }, { once: true });
    audio.play().catch(() => {
      finishAndStart();
    });
  }

  function fallbackFromVideo() {
    if (resolved || countdownStarted || audioStarted || videoFailed || videoHasStarted) return;
    videoFailed = true;
    startAudioFallback();
  }

  let narrationVideoSrc = '';
  if (video) {
    const _supportsWebM = !!document.createElement('video').canPlayType('video/webm; codecs="vp9"');
    narrationVideoSrc = resolveRuntimeAsset(_supportsWebM ? 'assets/videos/narration.webm' : 'assets/videos/narration.mp4');
    video.src = narrationVideoSrc;
    video.preload = 'auto';
    video.playsInline = true;
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');
    video.setAttribute('autoplay', '');
    video.load();
    logVideoState('video-configured', { requestedSrc: narrationVideoSrc });
    ['loadeddata', 'canplay', 'play', 'playing', 'ended', 'error', 'stalled'].forEach((eventName) => {
      video.addEventListener(eventName, (event) => {
        logVideoState(`event:${eventName}`, { eventType: event?.type || eventName });
      });
    });
    video.addEventListener('playing', () => {
      videoHasStarted = true;
      dbgInfo('[narration] video event: playing', { src: narrationVideoSrc });
      if (contentEl) contentEl.classList.add('video-ready');
      if (loadingEl) loadingEl.style.display = 'none';
      if (videoWatchdog) clearTimeout(videoWatchdog);
      videoWatchdog = null;
    }, { once: true });
    video.addEventListener('canplay', () => {
      dbgInfo('[narration] video event: canplay', { src: narrationVideoSrc });
      if (contentEl) contentEl.classList.add('video-ready');
      videoHasStarted = true;
      if (videoWatchdog) clearTimeout(videoWatchdog);
      videoWatchdog = null;
    }, { once: true });
    video.addEventListener('timeupdate', () => {
      if (!videoHasStarted && video.currentTime > 0) {
        videoHasStarted = true;
        if (videoWatchdog) clearTimeout(videoWatchdog);
        videoWatchdog = null;
      }
      if (!resolved && !countdownStarted && videoHasStarted
          && video.duration > 0 && (video.duration - video.currentTime) <= 10) {
        runCountdown(true);
      }
    });
    video.addEventListener('ended', () => {
      dbgInfo('[narration] video event: ended', { src: narrationVideoSrc });
      runCountdown();
    }, { once: true });
    video.addEventListener('error', (event) => {
      dbgWarn('[narration] video event: error', { src: narrationVideoSrc, eventType: event?.type || 'error' });
      fallbackFromVideo();
    }, { once: true });
  }

  skipBtn?.addEventListener('click', () => {
    finishAndStart();
  });

  if (video) {
    videoWatchdog = setTimeout(() => {
      if (!videoHasStarted && !countdownStarted && !resolved) fallbackFromVideo();
    }, 10000);
    logVideoState('before-play-call');
    video.muted = false;
    video.play().then(() => {
      dbgInfo('[narration] play() promise resolved (with audio)', { src: narrationVideoSrc });
      logVideoState('play-promise-resolved');
    }).catch((err) => {
      dbgWarn('[narration] play() with audio rejected, trying muted fallback', {
        src: narrationVideoSrc,
        message: err?.message || 'unknown play() rejection',
        name: err?.name || 'Error',
      });
      video.muted = true;
      video.play().then(() => {
        dbgInfo('[narration] play() muted fallback resolved', { src: narrationVideoSrc });
        logVideoState('play-promise-resolved-muted');
      }).catch((err2) => {
        dbgWarn('[narration] play() muted fallback also rejected', {
          src: narrationVideoSrc,
          message: err2?.message || 'unknown',
          name: err2?.name || 'Error',
        });
        logVideoState('play-promise-rejected', { errorName: err2?.name || 'Error' });
        fallbackFromVideo();
      });
    });
  } else {
    startAudioFallback();
  }
}

/* ---- הקצאת דלת אישית למשתתף ---- */
function _doorAssignKey(participantId) {
  return 'bioplay_door_assign_' + encodeURIComponent(ROOM_ID) + '_' + encodeURIComponent(participantId);
}

function getOrAssignDoor(participantId, activeIds) {
  if (!activeIds || activeIds.length === 0) return null;
  const key = _doorAssignKey(participantId);
  try {
    const saved = localStorage.getItem(key);
    if (saved) {
      const num = parseInt(saved, 10);
      if (activeIds.includes(num)) return num;
    }
  } catch (_) {}
  /* הקצאה דטרמיניסטית לפי hash של מזהה פנימי+חדר */
  let hash = 0;
  const str = participantId + ROOM_ID;
  for (let i = 0; i < str.length; i++) {
    hash = (hash * 31 + str.charCodeAt(i)) & 0x7fffffff;
  }
  const assigned = activeIds[hash % activeIds.length];
  try { localStorage.setItem(key, String(assigned)); } catch (_) {}
  return assigned;
}

function renderDoorSelection() {
  const ids = gameState.selectedDoorIds;
  const doorsToShow = (Array.isArray(ids) && ids.length > 0)
    ? DOOR_MAPPING.filter(d => ids.includes(d.num))
    : (gameState.doorsCount > 0 ? DOOR_MAPPING.slice(0, gameState.doorsCount) : DOOR_MAPPING);

  /* מצב רגיל – דלת אחת פעילה: ללא שום שינוי */
  if (doorsToShow.length <= 1) {
    const door = doorsToShow[0] || DOOR_MAPPING[0];
    if (!door) return;
    setScreen(`
      <div class="door-selection-scene">
        <div class="door-selection-hud">
          <span class="door-selection-hint">הדלת הסודית שלכם מחכה לכם. לחצו עליה כדי להתחיל את המסע</span>

          <button class="door-gate-btn" onclick="window.enterGate(${door.num})">

                 onerror="this.style.opacity='.3'"
                 class="door-gate-image" />
            <span class="door-gate-num">דלת מסתורית</span>
          </button>
        </div>
      </div>
    `);
    return;
  }

  /* מצב הקצאה אישית – יותר מדלת אחת פעילה: הצג רק את הדלת שהוקצתה */
  const activeIds = doorsToShow.map(d => d.num);
  const assignedNum = getOrAssignDoor(ensureParticipantId(), activeIds);
  const door = DOOR_MAPPING.find(d => d.num === assignedNum) || doorsToShow[0];

  /* דווח על ההקצאה למדריך */
  apiPost('gamescore', {
    name:  gameState.player.name,
    score: String(gameState.player.score),
    step:  'door_assigned',
    door:  String(door.num),
  });

  setScreen(`

      <div class="door-selection-hud">
        <span class="door-selection-hint">הדלת הסודית שלכם מחכה לכם. לחצו עליה כדי להתחיל את המסע</span>
      </div>

        <button class="door-gate-btn" onclick="window.enterGate(${door.num})">
          <img src="${escapeHTML(door.doorImg)}" alt="שער מסתורי"
               onerror="this.style.opacity='.3'"
               class="door-gate-image" />
          <span class="door-gate-num">דלת מסתורית</span>
        </button>
      </div>
    </div>
  `);
}

  if (!gameState.progress.step2Solved) { showError("השלימו את השלב הקודם תחילה."); return; }
  const normalizedAnswer = String(selectedAnswer || '').trim();
  if (!normalizedAnswer) return;
  if (normalizedAnswer !== String(gameData.step3.correctAnswer || '').trim()) {
    gameState._attempts.step3++;
    showError('זו לא התשובה הנכונה. נסו תשובה אחרת.');

  saveGameState();
  solveStep3(normalizedAnswer);
};

  const code = getActiveDoor1Code();

window.submitDoor1 = function() {
  const code    = getActiveDoor1Code();
  const entered = Array.from({length: code.length}, (_, i) => document.getElementById(`d1-${i}`)?.value.trim()).join('');
  if (entered.length < code.length) { showError(`הזינו את כל ${code.length} הספרות.`); return; }
  if (entered !== code) {
    document.getElementById('d1-row')?.classList.add('vault-shake');
    setTimeout(() => document.getElementById('d1-row')?.classList.remove('vault-shake'), 600);
    Array.from({length: code.length}, (_, i) => document.getElementById(`d1-${i}`))
      .forEach((el) => { if (el) el.value = ''; });

    showError(UI_COPY.door1Error);
    return;
  }
  const row = document.getElementById('d1-row');
  const msg = document.getElementById('d1-success-msg');
  row?.classList.add('success-glow');

window.hybridCheckCode = function() {
  const selectedHabitat = String(document.getElementById('hybrid-world-select')?.value || '').trim();
  const code = String(document.getElementById('hybrid-code-input')?.value || '').trim();
  const groupHabitat = getActiveHabitat();
  const groupProgress = gameState.hybrid.perGroupProgress[groupHabitat];
  const pairs = getHybridPairsByHabitat(groupHabitat);
  if (!selectedHabitat) { showError('בחרו עולם/בית גידול לפני בדיקה.'); return; }
  if (!/^\d{4}$/.test(code)) { showError('הזינו קוד בן 4 ספרות.'); return; }
  const pair = pairs.find((item) => item.fullCode === code);
  if (selectedHabitat !== groupHabitat || !pair) {
    showError('שגיאה: העולם/הקוד אינם תואמים לקבוצה.');
    return;
  }
  if (groupProgress.solvedPairs.includes(pair.pairId)) {
    showError('הצמד כבר נפתר קודם. לא ניתן לפתור פעמיים.');
    return;
  }
  groupProgress.solvedPairs.push(pair.pairId);
  groupProgress.solvedCount = groupProgress.solvedPairs.length;
  groupProgress.score += 1;
  if (groupProgress.solvedCount >= 7) groupProgress.secretRevealed = true;
  saveGameState();
  showDykPopup('הידעת? טקסט placeholder. ניתן להחליף בתוכן אמיתי.', `נכון! הושלם צמד ${groupProgress.solvedCount}/7`, () => renderCurrentScreen());
};

window.step5SelectCard = function(pairId, side) {
  const s5 = gameState._step5;
  const matchedIds = new Set(s5.matchedIds);

  if (matchedIds.has(pairId)) return;

  /* ביטול בחירה זהה */
  if (s5.selectedSide === side && s5.selectedCard === pairId) {
    s5.selectedCard = null;
    s5.selectedSide = null;
    renderStep5();
    return;
  }

  /* אותו צד – מחליף בחירה */
  if (s5.selectedSide === side) {
    s5.selectedCard = pairId;
    renderStep5();
    return;
  }

  /* שני צדדים נבחרו – בדיקת התאמה */
  if (s5.selectedSide !== null && s5.selectedSide !== side) {
    const natureId = s5.selectedSide === "nature" ? s5.selectedCard : pairId;
    const techId   = s5.selectedSide === "tech"   ? s5.selectedCard : pairId;

    s5.selectedCard = null;
    s5.selectedSide = null;

    if (natureId === techId) {
      /* התאמה נכונה */
      const newMatchedIds = [...matchedIds, natureId];
      s5.matchedIds = newMatchedIds;

      const pair = gameData.step5.pairs.find(p => p.id === natureId);
      if (pair) showSuccess(`✓ ${pair.info}`);

      if (newMatchedIds.length === gameData.step5.pairs.length) {
        /* כל ההתאמות הושלמו */
        setTimeout(() => {
          solveStep5(newMatchedIds.map(id => {
            const p = gameData.step5.pairs.find(x => x.id === id);
            return `${p.nature.label} ↔ ${p.tech.label}`;
          }));
        }, 600);
      } else {
        renderStep5();
      }
    } else {
      /* התאמה שגויה */
      showError("לא מתאים – נסו שוב.");
      renderStep5();
    }
    return;
  }

  /* בחירה ראשונה */
  s5.selectedCard = pairId;
  s5.selectedSide = side;
  renderStep5();
};

  const game = STEP6_GAMES[s6.selectedGame] || games[0];
  const items = Array.isArray(game.items) ? game.items : [];
  const required = getStep6TargetToFind(game);

  const hotspotsHtml = game.items.map((item, hi) => {
    const found = foundSet.has(item.id);

    const left = cx - cw / 2;

function _step6ShowFoundPopup(item, isLast, afterClose) {
  const existing = document.getElementById('step6-found-popup');
  if (existing) existing.remove();

  /* פריט אחרון — סוגרים fullscreen כדי שההודעה תופיע על רקע המשחק */
  if (isLast) {
    const fsOverlay = document.getElementById('step6-fs-overlay');
    if (fsOverlay) fsOverlay.remove();
  }

  const popup = document.createElement('div');
  popup.id        = 'step6-found-popup';
  popup.className = 'step6-found-popup';

  const imgHtml = item.image
    ? `<img class="step6-found-img" src="${escapeHTML(item.image)}" alt="${escapeHTML(item.name)}" />`
    : `<div class="step6-found-badge">✅</div>`;

  const continueBtn = isLast ? `
    <button class="step6-found-continue" id="step6-found-continue-btn">אישור →</button>` : '';
  const keepBtn = !isLast ? `
    <button class="step6-found-keep" id="step6-found-keep-btn">המשיכו לחפש</button>` : '';

  popup.innerHTML = `
    <div class="step6-found-card">
      ${imgHtml}
      <div class="step6-found-label">${isLast ? '🎉 כל הפריטים נמצאו!' : 'נמצא!'}</div>
      <div class="step6-found-name">${escapeHTML(item.name)}</div>
      ${continueBtn}
      ${keepBtn}
    </div>
  `;

  document.body.appendChild(popup);

  /* מניעת "tap-through": ה-popup מופיע בזמן שהלחיצה עדיין מוחזקת.
     בלי עיכוב, שחרור האצבע מופעל כ-click על הכפתור שנמצא שם. */
  popup.style.pointerEvents = 'none';
  setTimeout(() => { popup.style.pointerEvents = ''; }, 420);

  function _closePopup() {
    popup.style.animation = 'step6FsIn .18s ease reverse forwards';
    setTimeout(() => { popup.remove(); if (afterClose) afterClose(); }, 170);
  }

  if (isLast) {
    const continueEl = popup.querySelector('#step6-found-continue-btn');
    if (continueEl) {
      continueEl.addEventListener('click', function() {
        popup.remove();
        window.step6Complete();
      });
    }
    /* לפריט האחרון: ממתינים ללחיצת אישור בלבד — אין סגירה אוטומטית */
  } else {
    const keepEl = popup.querySelector('#step6-found-keep-btn');
    if (keepEl) keepEl.addEventListener('click', _closePopup);
    setTimeout(_closePopup, 2000);
  }

  popup.addEventListener('click', (e) => {
    if (e.target === popup && !isLast) _closePopup();
  });
}

function _step6BuildFsHtml() {
  const s6      = gameState._step6;
  const game    = STEP6_GAMES[s6.selectedGame];
  if (!game) return '';
  const items     = Array.isArray(game.items) ? game.items : [];
  const required  = getStep6TargetToFind(game);
  const foundSet  = new Set(s6.foundItemIds || []);
  const foundCount = foundSet.size;
  const canFinish = foundCount >= required;
  const ui        = gameData.step6.ui || {};

  const progressText = escapeHTML(
    (UI_COPY.step5ProgressTemplate || 'נמצאו: {found} מתוך {required}')
      .replace('{found}', String(Math.min(foundCount, required)))
      .replace('{required}', String(required))
  );

  const hotspotsHtml = items.map((item, hi) => {
    const found   = foundSet.has(item.id);
    const hotspot = item.hotspot || { x: 50, y: 50, w: 6, h: 6 };
    const cx = Math.min(Math.max(Number(hotspot.x) || 50, 0), 100);
    const cy = Math.min(Math.max(Number(hotspot.y) || 50, 0), 100);
    const cw = Math.min(Math.max(Number(hotspot.w) || 6, 2), 40);
    const ch = Math.min(Math.max(Number(hotspot.h) || 6, 2), 40);
    const left = cx - cw / 2;
    const top  = cy - ch / 2;
    const aria    = found ? escapeHTML(item.name) : `אזור חיפוש ${hi + 1}`;
    return `<button class="step6-hotspot ${found ? 'found' : ''}" style="left:${left}%;top:${top}%;width:${cw}%;height:${ch}%;" onclick="window.step6FindItemFS(event,'${item.id}')" aria-label="${aria}"></button>`;
  }).join('');

  const itemsHtml = items.map((item) => {
    const found = foundSet.has(item.id);
    return `<div class="step6-item-box ${found ? 'found' : 'step6-item-box--pending'}">
      ${found ? `<img src="${escapeHTML(item.image)}" alt="${escapeHTML(item.name)}" />` : `<span class="step6-item-pending-mark" aria-hidden="true"></span>`}
      <div class="step6-item-name ${found ? '' : 'step6-item-name--placeholder'}">${escapeHTML(item.name)}</div>
    </div>`;
  }).join('');

  const successHtml = '';

  return `
    <div class="step6-fs-topbar">
      <span style="font-weight:700;color:#bdeaff;font-size:.9rem">${escapeHTML(UI_COPY.step5TopBarTitle || ui.topBarTitle || '')}</span>
      <span class="step6-progress-pill">${progressText}</span>
      <button class="step6-fs-close-btn" onclick="window.step6CloseFullscreen()">✕ סגור</button>
    </div>
    <div class="step6-fs-content">
      <div class="step6-fs-scene" style="background-image:url('${escapeHTML(game.image)}')" onclick="window.step6MissTapFS(event)">
        ${hotspotsHtml}
        ${successHtml}
      </div>
      <div class="step6-fs-strip">${itemsHtml}</div>
    </div>
  `;
}

window.d2Advance = function(idx) {
  const code = getActiveDoor2Code();
  const val  = document.getElementById(`d2-${idx}`)?.value;
  if (val && idx < code.length - 1) document.getElementById(`d2-${idx+1}`)?.focus();
};

window.d2Keydown = function(event, idx) {
  if (!event) return;
  if (event.key === 'Enter') {
    event.preventDefault();
    window.submitDoor2();
    return;
  }
  if (event.key === 'Backspace') {
    const current = document.getElementById(`d2-${idx}`);
    if (current && !current.value && idx > 0) {
      const prev = document.getElementById(`d2-${idx - 1}`);
      if (prev) prev.focus();
    }
  }
};

window.submitDoor2 = function() {
  try {
  if (gameState.progress.door2Unlocked) {
    goToScreen(getNextScreen('door_2'));
    return;
  }
  const code    = getActiveDoor2Code();
  const entered = Array.from({length: code.length}, (_, i) => document.getElementById(`d2-${i}`)?.value.trim()).join('');
  if (entered.length < code.length) { showError(`הזינו את כל ${code.length} הספרות.`); return; }
  if (String(entered).trim() !== String(code)) {
    document.getElementById('d2-row')?.classList.add('vault-shake');
    setTimeout(() => document.getElementById('d2-row')?.classList.remove('vault-shake'), 600);
    Array.from({length: code.length}, (_, i) => document.getElementById(`d2-${i}`))
      .forEach((el) => { if (el) el.value = ''; });
    document.getElementById('d2-0')?.focus();
    showError("הקוד עדיין לא נכון. נסו שוב לפי סדר השלבים.");
    return;
  }
  document.getElementById('d2-row')?.classList.add('success-glow');
  const msg = document.getElementById('d2-success-msg');
  if (msg) msg.textContent = '✨ מצוין! הקוד נכון — המחסום מתפוגג...';
  setUiBusy(true, 'בודקים קוד...');
  unlockDoor2(entered);
  } catch (err) {
    console.error('submitDoor2 failed:', err);
    setUiBusy(false);
    showError('אירעה שגיאה בפתיחת הדלת. נסו שוב.');
  }
};

/* ---- Step 8: Cipher ---- */
/* ---------- נתוני שלב 8 ---------- */
const S8_CIPHER_MAP = {
  1:'א',2:'ב',3:'ג',4:'ד',5:'ה',6:'ו',7:'ז',8:'ח',9:'ט',
  10:'י',11:'כ',12:'ל',13:'מ',14:'נ',15:'ס',16:'ע',17:'פ',
  18:'צ',19:'ק',20:'ר',21:'ש',22:'ת'
};
const S8_WORDS        = ['השראה','מן','הטבע'];
const S8_FINAL_FORMS  = {'ך':'כ','ם':'מ','ן':'נ','ף':'פ','ץ':'צ'};
/* S8_FLAT מנורמל לצורות רגילות (לא סופיות) כדי להתאים לקלט המנורמל */
const S8_FLAT         = S8_WORDS.join('').split('').map(c => S8_FINAL_FORMS[c] || c).join('');

function s8NormChar(ch) {
  const c = (ch || '').trim().slice(-1);
  if (!/^[א-תךםןףץ]$/.test(c)) return '';
  return S8_FINAL_FORMS[c] || c;
}

    p.className = 's8-confetti-piece';

}

        </div>
      </div>
    </div>

    <div class="s8-confetti-layer" id="s8-confetti-layer"></div>
  `);

  setTimeout(step8Init, 0);
}

function step8Init() {
  /* ---- מפתח ---- */
  const keyGrid = document.getElementById('s8-key-grid');
  if (keyGrid) {
    Object.entries(S8_CIPHER_MAP).forEach(([num, letter]) => {
      const item = document.createElement('div');
      item.className = 's8-key-item';
      item.innerHTML = `<strong>${num}</strong><span>${letter}</span>`;
      keyGrid.appendChild(item);
    });
  }

  const boxes      = Array.from(document.querySelectorAll('.s8-letter-box'));
  const checkBtn   = document.getElementById('s8-check-btn');
  const clearBtn   = document.getElementById('s8-clear-btn');
  const continueBtn= document.getElementById('s8-continue-btn');
  const modal      = document.getElementById('s8-modal');
  const statusCard = document.getElementById('s8-status-card');

  if (!boxes.length || !checkBtn) return;

  const hebrewPat = /^[א-תךםןףץ]$/;

  function setStatus(msg, type) {
    if (!statusCard) return;
    statusCard.classList.remove('success','error');
    if (type) statusCard.classList.add(type);
    statusCard.innerHTML = msg;
  }

  function openModal() {
    if (!modal) return;
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
    s8BurstConfetti();
  }

  function closeModal() {
    if (!modal) return;
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
  }

  function moveFwd(i) { if (i < boxes.length - 1) { boxes[i+1].focus(); boxes[i+1].select(); } }
  function moveBwd(i) { if (i > 0)               { boxes[i-1].focus(); boxes[i-1].select(); } }

  boxes.forEach((box, i) => {
    box.disabled = false;
    box.readOnly = false;
    box.removeAttribute('disabled');
    box.removeAttribute('readonly');

    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace') {
        if (box.value) {
          box.value = '';
          box.classList.remove('filled','error','success');
        } else {
          moveBwd(i);
          if (i > 0) { boxes[i-1].value = ''; boxes[i-1].classList.remove('filled','error','success'); }
        }
        e.preventDefault(); return;
      }
      if (e.key === 'ArrowLeft')  { moveFwd(i); e.preventDefault(); return; }
      if (e.key === 'ArrowRight') { moveBwd(i); e.preventDefault(); return; }
      if (e.key.length === 1 && hebrewPat.test(e.key)) {
        box.value = s8NormChar(e.key);
        box.classList.add('filled');
        box.classList.remove('error','success');
        moveFwd(i);
        e.preventDefault();
      }
    });

    box.addEventListener('input', () => {
      const n = s8NormChar(box.value);
      box.value = n;
      box.classList.toggle('filled', !!n);
      box.classList.remove('error','success');
      if (n) moveFwd(i);
    });

    box.addEventListener('focus', () => box.select());

    box.addEventListener('paste', e => {
      e.preventDefault();
      const chars = Array.from((e.clipboardData || window.clipboardData).getData('text'))
        .map(s8NormChar).filter(Boolean);
      let cur = i;
      chars.forEach(ch => {
        if (cur >= boxes.length) return;
        boxes[cur].value = ch;
        boxes[cur].classList.add('filled');
        boxes[cur].classList.remove('error','success');
        cur++;
      });
      const fi = Math.min(cur, boxes.length - 1);
      boxes[fi].focus(); boxes[fi].select();
    });
  });

  checkBtn.addEventListener('click', () => {
    boxes.forEach(b => b.classList.remove('success','error'));
    const entered = boxes.map(b => s8NormChar(b.value)).join('');

    if (entered.length !== S8_FLAT.length) {
      setStatus('יש למלא את כל התיבות לפני הבדיקה.', 'error');
      boxes.filter(b => !s8NormChar(b.value)).forEach(b => b.classList.add('error'));
      return;
    }

    if (entered === S8_FLAT) {
      boxes.forEach((b, i) => setTimeout(() => b.classList.add('success'), i * 45));
      openModal();
      return;
    }

    boxes.forEach((b, i) => b.classList.add(s8NormChar(b.value) === S8_FLAT[i] ? 'success' : 'error'));
    setStatus('הפתרון אינו נכון. בדקו שוב את התאמת המספרים לאותיות ונסו מחדש.', 'error');
  });

  clearBtn.addEventListener('click', () => {
    boxes.forEach(b => { b.value = ''; b.classList.remove('filled','success','error'); });
    closeModal();
    setStatus('מלאו את התיבות לפי הסדר וגלו את המשפט הסודי.');
    boxes[0].focus();
  });

  if (continueBtn) {
    continueBtn.addEventListener('click', () => {
      closeModal();
      solveStep8();
    });
  }

  if (modal) {
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  }

  boxes[0]?.focus();

  document.addEventListener('keydown', function s8Escape(e) {
    if (e.key === 'Escape') closeModal();
    if (gameState.currentScreen !== 'step_8_cipher') {
      document.removeEventListener('keydown', s8Escape);
    }
  });

  boxes[0]?.focus();
}

/* ---- רקע: כוכבים מהבהבים + יהלומים עולים ---- */
function _initFinSparkles() {
  const canvas = document.getElementById('fin-sparkles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const onResize = () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  };
  window.addEventListener('resize', onResize);

  const PALETTE = [
    '#FFD700', '#FFF8DC', '#FFFFFF',
    '#FFB6C1', '#DDA0DD', '#87CEEB',
    '#FFA500', '#E8D5FF', '#FFFACD',
  ];
  const rnd = (a, b) => a + Math.random() * (b - a);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  const stars = Array.from({ length: 110 }, () => ({
    x: rnd(0, 1) * W,
    y: rnd(0, 1) * H,
    r: rnd(0.4, 2.4),
    a: rnd(0, 1),
    da: rnd(0.005, 0.024) * (Math.random() > 0.5 ? 1 : -1),
    color: pick(PALETTE),
  }));

  const drifters = [];
  const spawnDrifter = () => ({
    x: rnd(0, 1) * W,
    y: H + rnd(0, 60),
    r: rnd(1.5, 5),
    vx: rnd(-0.35, 0.35),
    vy: rnd(0.5, 1.5),
    a: rnd(0.5, 0.9),
    life: 1,
    decay: rnd(0.002, 0.005),
    color: pick(PALETTE),
    rot: rnd(0, Math.PI),
    drot: rnd(-0.05, 0.05),
  });
  for (let i = 0; i < 40; i++) {
    const d = spawnDrifter();
    d.y = rnd(0, 1) * H;
    drifters.push(d);
  }

  let frame = 0;

  const tick = () => {
    if (!document.getElementById('fin-sparkles')) {
      window.removeEventListener('resize', onResize);
      return;
    }
    ctx.clearRect(0, 0, W, H);
    frame++;

    if (frame % 5 === 0) drifters.push(spawnDrifter());

    for (const s of stars) {
      s.a += s.da;
      if (s.a > 1) { s.a = 1; s.da *= -1; }
      if (s.a < 0) { s.a = 0; s.da *= -1; }

      ctx.save();
      ctx.globalAlpha = s.a;
      ctx.fillStyle = s.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      if (s.r > 1.2 && s.a > 0.4) {
        ctx.globalAlpha = s.a * 0.55;
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 0.7;
        ctx.shadowBlur = 12;
        const len = s.r * 4;
        ctx.beginPath();
        ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
        ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
        ctx.stroke();
      }
      ctx.restore();
    }

    for (let i = drifters.length - 1; i >= 0; i--) {
      const d = drifters[i];
      d.x  += d.vx;
      d.y  -= d.vy;
      d.rot += d.drot;
      d.life -= d.decay;
      if (d.y < -20 || d.life <= 0) { drifters.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = d.a * d.life;
      ctx.fillStyle = d.color;
      ctx.shadowBlur = 16;
      ctx.shadowColor = d.color;
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      ctx.fillRect(-d.r * 0.65, -d.r * 0.65, d.r * 1.3, d.r * 1.3);
      ctx.restore();
    }

    window._finRaf = requestAnimationFrame(tick);
  };

  if (window._finRaf) cancelAnimationFrame(window._finRaf);
  tick();
}

/* ---- אבקת פיות ממוקדת על התמונה ---- */
function _initFinDust() {
  const canvas = document.getElementById('fin-dust');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  let W = canvas.width  = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  const onResize = () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  };
  window.addEventListener('resize', onResize);

  /* פלטת צבעים של אבקת פיות — לבן-זהב-ורוד-תכלת */
  const DUST = [
    '#FFFFFF', '#FFD700', '#FFFACD', '#FFE4E1',
    '#E0E8FF', '#FFB6C1', '#FFEFD5', '#E8D5FF', '#B0F0FF',
  ];
  const rnd = (a, b) => a + Math.random() * (b - a);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  /* מיקום מרכז התמונה — נחשב דינמית */
  const cx = () => W / 2;
  const cy = () => H / 2;

  /* הגדרת נתיב אקראי מסביב לתמונה */
  const imgHW = () => Math.min(W * 0.44, 340);
  const imgHH = () => Math.min(H * 0.41, 280);

  /* חלקיקי אבקת פיות */
  const dust = [];

  const spawnDust = () => {
    /* נקודת מוצא: אקראי על פריפריית התמונה */
    const angle = rnd(0, Math.PI * 2);
    const ex = imgHW();
    const ey = imgHH();
    const px = cx() + Math.cos(angle) * ex * rnd(0.2, 1.1);
    const py = cy() + Math.sin(angle) * ey * rnd(0.2, 1.1);
    /* כיוון תנועה: החוצה + קצת למעלה */
    const speed = rnd(0.3, 1.2);
    const vx = Math.cos(angle) * speed * rnd(0.5, 1.4);
    const vy = Math.sin(angle) * speed * rnd(0.5, 1.4) - rnd(0.2, 0.7);
    return {
      x: px, y: py,
      vx, vy,
      r: rnd(0.8, 3.2),
      a: rnd(0.7, 1),
      life: 1,
      decay: rnd(0.008, 0.022),
      color: pick(DUST),
      rot: rnd(0, Math.PI * 2),
      drot: rnd(-0.08, 0.08),
      type: Math.random() > 0.55 ? 'star4' : 'circle',
    };
  };

  /* זרע ראשוני */
  for (let i = 0; i < 50; i++) {
    const d = spawnDust();
    d.life = rnd(0.3, 1);
    dust.push(d);
  }

  /* פונקציה לציור כוכב 4 קצוות (נצנץ) */
  const drawStar4 = (ctx, x, y, r, rot) => {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const b = ((i + 0.5) / 4) * Math.PI * 2;
      i === 0
        ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
        : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(b) * r * 0.38, Math.sin(b) * r * 0.38);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  };

  let frame = 0;

  const tick = () => {
    if (!document.getElementById('fin-dust')) {
      window.removeEventListener('resize', onResize);
      return;
    }
    ctx.clearRect(0, 0, W, H);
    frame++;

    /* spawn: הרבה יותר חלקיקים מהתמונה */
    const spawnRate = frame < 180 ? 5 : 8;
    if (frame % spawnRate === 0) {
      for (let i = 0; i < 3; i++) dust.push(spawnDust());
    }

    for (let i = dust.length - 1; i >= 0; i--) {
      const d = dust[i];
      d.x  += d.vx;
      d.y  += d.vy;
      d.vy -= 0.012; /* כבידה קלה כלפי מטה */
      d.rot += d.drot;
      d.life -= d.decay;
      if (d.life <= 0) { dust.splice(i, 1); continue; }

      const alpha = d.a * d.life;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = d.color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = d.color;

      if (d.type === 'star4') {
        drawStar4(ctx, d.x, d.y, d.r * 1.6, d.rot);
      } else {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
      }

      /* זנב זוהר קצר */
      if (d.r > 1.8 && alpha > 0.3) {
        ctx.globalAlpha = alpha * 0.35;
        ctx.strokeStyle = d.color;
        ctx.lineWidth = d.r * 0.5;
        ctx.lineCap = 'round';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(d.x - d.vx * 4, d.y - d.vy * 4);
        ctx.lineTo(d.x, d.y);
        ctx.stroke();
      }
      ctx.restore();
    }

    window._finDustRaf = requestAnimationFrame(tick);
  };

  if (window._finDustRaf) cancelAnimationFrame(window._finDustRaf);
  tick();
}

/* הצגת מסך סיום: סרטון + ניקוד */
function showActualFinalScreen() {
  console.info('[final-flow] mounting ending video screen');
  hideIframe();
  setScreen(`
    <div class="narration-overlay" id="opendoor-overlay" style="z-index:10">
      <div class="video-overlay__backdrop" aria-hidden="true"></div>
      <div class="video-overlay__dialog">
        <div class="narration-content" dir="rtl">
          <button class="narration-skip-btn" id="opendoor-skip">דלג</button>
          <div class="video-overlay__media">
            <video
              id="opendoor-video"
              class="narration-video video-overlay__video"
              playsinline
              webkit-playsinline
              preload="auto"
            ></video>
            <div class="video-overlay__loading" id="opendoor-loading">טוענים סרטון סיום...</div>
          </div>
        </div>
      </div>
    </div>
  `);
  const opendoorEl = document.getElementById('opendoor-video');
  console.info('[final-flow] ending video element query', { found: Boolean(opendoorEl) });
  if (!opendoorEl) {
    console.error('[final-flow] ending video element missing from DOM');
    renderFinalSummary();
    return;
  }

  let transitioned = false;
  let summaryTimer = null;
  const goSummary = () => {
    if (transitioned) return;
    transitioned = true;
    if (summaryTimer) clearTimeout(summaryTimer);
    summaryTimer = null;
    if (playStartedTimer) { clearTimeout(playStartedTimer); playStartedTimer = null; }
    const unmuteBtn = document.getElementById('unmute-video-btn');
    if (unmuteBtn) unmuteBtn.remove();
    try {
      if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
    } catch (_) {}
    const overlayEl = document.getElementById('opendoor-overlay');
    if (overlayEl) {
      overlayEl.classList.add('narration-overlay--fadeout');
      setTimeout(renderFinalSummary, 480);
    } else {
      renderFinalSummary();
    }
  };

  const startSummaryFallbackTimer = (ms = 18000) => {
    if (summaryTimer) clearTimeout(summaryTimer);
    summaryTimer = setTimeout(goSummary, ms);
  };

  document.getElementById('opendoor-skip')?.addEventListener('click', goSummary);

  const opendoorSrc = resolveRuntimeAsset('assets/videos/opendoor.mp4');
  opendoorEl.controls = false;
  opendoorEl.setAttribute('playsinline', '');
  opendoorEl.setAttribute('webkit-playsinline', '');
  opendoorEl.preload = 'auto';
  opendoorEl.src = opendoorSrc;
  console.info('[final-flow] ending video source configured', { src: opendoorSrc });

  let playStartedTimer = null;
  ['canplay', 'loadeddata', 'play'].forEach((eventName) => {
    opendoorEl.addEventListener(eventName, () => {
      console.info(`[final-flow] ending video event: ${eventName}`, {
        readyState: opendoorEl.readyState,
        currentTime: opendoorEl.currentTime,
        src: opendoorEl.currentSrc || opendoorSrc
      });
      if (eventName === 'play' || eventName === 'canplay') {
        const loadingEl = document.getElementById('opendoor-loading');
        if (loadingEl) loadingEl.style.display = 'none';
        if (eventName === 'play') {
          if (playStartedTimer) { clearTimeout(playStartedTimer); playStartedTimer = null; }
        }
      }
    });
  });
  opendoorEl.addEventListener('loadedmetadata', () => {
    const durationSec = Number(opendoorEl.duration);
    console.info('[final-flow] ending video event: loadedmetadata', { durationSec });
    if (Number.isFinite(durationSec) && durationSec > 0) {
      const bufferMs = 1200;
      startSummaryFallbackTimer(Math.max(3000, Math.ceil(durationSec * 1000) + bufferMs));
    }
    if (!playStartedTimer) {
      playStartedTimer = setTimeout(() => {
        if (!transitioned && opendoorEl.paused) {
          console.warn('[final-flow] play event not fired within 3s, transitioning to summary');
          goSummary();
        }
      }, 3000);
    }
  }, { once: true });
  opendoorEl.addEventListener('ended', goSummary, { once: true });
  opendoorEl.addEventListener('error', (event) => {
    console.error('[final-flow] ending video event: error', {
      eventType: event?.type || 'error',
      error: opendoorEl.error ? {
        code: opendoorEl.error.code,
        message: opendoorEl.error.message || 'unknown media error'
      } : null,
      src: opendoorEl.currentSrc || opendoorSrc
    });
  }, { once: true });
  startSummaryFallbackTimer();

  let playbackAttempts = 0;
  const maxPlaybackAttempts = 3;
  const tryPlay = async ({ muted, forceReload, reason }) => {
    playbackAttempts += 1;
    if (forceReload) {
      opendoorEl.load();
    }
    opendoorEl.muted = muted;
    console.info('[final-flow] ending video playback attempt', {
      attempt: playbackAttempts,
      muted,
      forceReload,
      reason
    });
    return opendoorEl.play();
  };

  const showUnmuteButton = () => {
    const existingBtn = document.getElementById('unmute-video-btn');
    if (existingBtn) return;
    const btn = document.createElement('button');
    btn.id = 'unmute-video-btn';
    btn.textContent = '🔊 הפעל קול';
    btn.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 28px;background:rgba(255,255,255,0.18);color:#fff;border:2px solid rgba(255,255,255,0.5);border-radius:32px;font-size:1.1rem;cursor:pointer;backdrop-filter:blur(6px);';
    btn.addEventListener('click', () => {
      opendoorEl.muted = false;
      btn.remove();
    });
    document.body.appendChild(btn);
    opendoorEl.addEventListener('ended', () => btn.remove(), { once: true });
  };

  const startPlayback = async () => {
    try {
      await tryPlay({ muted: true, forceReload: false, reason: 'initial-muted' });
      showUnmuteButton();
      if (!document.fullscreenElement && opendoorEl.requestFullscreen) {
        opendoorEl.requestFullscreen().catch(() => {});
      }
      return;
    } catch (firstErr) {
      console.error('[final-flow] ending video autoplay failed (muted)', firstErr);
    }

    while (playbackAttempts < maxPlaybackAttempts) {
      try {
        await tryPlay({ muted: true, forceReload: true, reason: 'retry-load-and-play' });
        showUnmuteButton();
        return;
      } catch (retryErr) {
        console.error('[final-flow] ending video retry failed', retryErr);
      }
    }
    goSummary();
  };

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      startPlayback();
    });
  });
}

document.addEventListener("DOMContentLoaded", async function() {
  /* Preload all background images eagerly to prevent white flash on screen transitions */
  (function preloadBackgrounds() {
    const ext = _bgSupportsWebP ? 'webp' : 'png';
    const load = (n) => { const img = new Image(); img.src = `assets/images/backgrounds/bg-${n}.${ext}`; };
    for (let i = 1; i <= 11; i++) load(i);
  })();

  try { await loadStage3Habitats(); } catch (_) {}
  try { await loadStep6HiddenGames(); } catch (_) {}
  enrichDoorMappingData();
  rebuildDykByOrganism();
  const loaded = loadGameState();
  if (!loaded) {
    gameState.currentScreen = "name_entry";
  }
  ensureHybridState();
  let _skipToCountdown = false;
  try {
    const pending = sessionStorage.getItem('bioplay_pending_name');
    if (pending && !gameState.player.name) gameState.player.name = pending;
    if (gameState.player.name && gameState.currentScreen === 'name_entry') {
      const st = await apiGet('gamestatus');
      if (isGameActiveStatus(st?.status)) {
        applyAdminGroupConfig(st);
        gameState.selectedDoorIds = Array.isArray(st.selectedDoors) && st.selectedDoors.length ? st.selectedDoors : gameState.selectedDoorIds;
        gameState.enabledSteps = Array.isArray(st.enabledSteps) && st.enabledSteps.length ? st.enabledSteps : gameState.enabledSteps;
        gameState.doorsCount = Number(st.doorsCount || gameState.doorsCount || 0);
        gameState.currentScreen = 'name_entry';
        _skipToCountdown = true;
      }
    }
  } catch (_) {}
  try { await hydrateDoorMappingFromJson(); } catch (_) {}
  try { await loadScreensCopy(); applyScreensCopyToRuntime(); } catch (_) {}
  applySelectedDoorContent();
  applyScreenBackground(gameState.currentScreen);
  updateHeader();
  renderCurrentScreen();
  if (_skipToCountdown && gameState.player.name) {
    if (_namePoll) { clearInterval(_namePoll); _namePoll = null; }
    const participantId = ensureParticipantId();
    const name = gameState.player.name;
    gameState.player.score = 0;
    saveGameState();
    try { sessionStorage.removeItem('bioplay_pending_name'); } catch (_) {}
    startCountdownWithNarration();
    apiPost('gamejoin', { name, participantId }).catch(() => {});
  }
  window.addEventListener('resize', () => requestAnimationFrame(applyAutoScale));
});

/* ============================================================
   MICRO-INTERACTIONS — ripple + haptic
   ============================================================ */
(function initMicroInteractions() {
  /* ripple רק על כפתורים פשוטים — לא על כרטיסים עם flip */
  const RIPPLE_SEL = [
    'button', '.btn', '.vault-btn', '.s1-option-btn', '.door-submit-btn',
    '.dyk-popup-btn', '.narration-name-btn', '.cipher-cell'
  ].join(',');

  /* haptic (רטט) לכולם */
  const HAPTIC_SEL = RIPPLE_SEL + ', .flip-card, .match-card, .org-card, [role="button"]';

  function spawnRipple(el, clientX, clientY) {
    const style = window.getComputedStyle(el);
    /* אל תוסיף ripple אם לא ניתן לחתוך overflow */
    if (style.overflow === 'visible' || style.overflow === '') el.style.overflow = 'hidden';
    el.classList.add('ripple-host');
    const rect = el.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple-circle';
    r.style.left = (clientX - rect.left - 30) + 'px';
    r.style.top  = (clientY - rect.top  - 30) + 'px';
    el.appendChild(r);
    setTimeout(() => r.remove(), 620);
  }

  function haptic() {
    if (navigator.vibrate) navigator.vibrate(10);
  }

  document.addEventListener('pointerdown', function(e) {
    const rippleEl = e.target.closest(RIPPLE_SEL);
    if (rippleEl) spawnRipple(rippleEl, e.clientX, e.clientY);

    const hapticEl = e.target.closest(HAPTIC_SEL);
    if (hapticEl) haptic();
  }, { passive: true });
})();
</script>

<script>

    Object.assign(el.style, {
      width:  size + 'px',
      height: size + 'px',
      left:   Math.random() * 100 + 'vw',
      bottom: '-10px',
      background: color + '0.9)',
      boxShadow: `0 0 ${glow}px ${glow/2}px ${color}0.4)`,

      animationDelay:     delay + 's',

    setTimeout(() => el.remove(), (dur + Math.abs(delay)) * 1000 + 200);

  /* spawn 35 initial sparks, then keep adding */

  /* --- Floating bio runes (nature emojis) --- */

  const BIO_RUNES = ['🧬','🍃','🌿','🦠','🔬','⚗️','🌱','🕸️','🐾','🦋','🌾','🔮'];

    el.className = 'bio-rune';
    el.textContent = BIO_RUNES[Math.floor(Math.random() * BIO_RUNES.length)];
    const dur  = 22 + Math.random() * 28;
    const delay = Math.random() * -15;
    Object.assign(el.style, {
      left:               Math.random() * 100 + 'vw',
      bottom:             '-60px',
      fontSize:           (1.2 + Math.random() * 1.8) + 'rem',
      opacity:            0.04 + Math.random() * 0.05,
      animationDuration:  dur + 's',
      animationDelay:     delay + 's',
    });
    runes.appendChild(el);
    setTimeout(() => el.remove(), (dur + Math.abs(delay)) * 1000 + 500);
  }

  for (let i = 0; i < 14; i++) setTimeout(createRune, i * 1200);
  setInterval(createRune, 2200);

  /* --- Magic burst on success --- */
  const burst = document.getElementById('magic-burst');
  const BURST_COLORS = ['#62d9ff','#88f3b9','#ffd76a','#c080ff','#ffffff','#5ef5a0'];

  window.triggerMagicBurst = function(x, y) {
    for (let i = 0; i < 22; i++) {
      const p   = document.createElement('div');
      p.className = 'burst-particle';
      const size  = 4 + Math.random() * 8;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 140;
      const bx    = Math.cos(angle) * dist;
      const by    = Math.sin(angle) * dist;

        width:    size + 'px',
        height:   size + 'px',

        top:      (y - size / 2) + 'px',

        boxShadow: `0 0 ${size*2}px ${BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)]}`,

        '--by':   by + 'px',

        animationDelay:    (Math.random() * .15) + 's',

      burst.appendChild(p);
      setTimeout(() => p.remove(), 1200);
