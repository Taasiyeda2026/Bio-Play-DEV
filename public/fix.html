<script>
(function bioMagic() {
  /* --- Firefly sparkles --- */
  const sparks = document.getElementById('bio-sparks');
  const SPARK_COLORS = [
    'rgba(98,217,255,',   // cyan
    'rgba(136,243,185,',  // mint
    'rgba(255,231,155,',  // gold
    'rgba(210,160,255,',  // violet
    'rgba(80,220,180,',   // teal
  ];

  function createSpark() {
    const el = document.createElement('div');
    el.className = 'spark';
    const size  = 2 + Math.random() * 5;
    const color = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
    const dur   = 8 + Math.random() * 18;
    const delay = Math.random() * -20;
    const glow  = size * 3;
    Object.assign(el.style, {
      width:  size + 'px',
      height: size + 'px',
      left:   Math.random() * 100 + 'vw',
      bottom: '-10px',
      background: color + '0.9)',
      boxShadow: `0 0 ${glow}px ${glow/2}px ${color}0.4)`,
      animationDuration:  dur + 's',
      animationDelay:     delay + 's',
    });
    sparks.appendChild(el);
    setTimeout(() => el.remove(), (dur + Math.abs(delay)) * 1000 + 200);
  }

  /* spawn 35 initial sparks, then keep adding */
  for (let i = 0; i < 35; i++) {
    setTimeout(createSpark, i * 400);
  }
  setInterval(createSpark, 600);

  /* --- Floating bio runes (nature emojis) --- */
  const runes = document.getElementById('bio-runes');
  const BIO_RUNES = ['🧬','🍃','🌿','🦠','🔬','⚗️','🌱','🕸️','🐾','🦋','🌾','🔮'];

  function createRune() {
    const el   = document.createElement('span');
    el.className = 'bio-rune';
    el.textContent = BIO_RUNES[Math.floor(Math.random() * BIO_RUNES.length)];
    const dur  = 22 + Math.random() * 28;
    const delay = Math.random() * -15;
    Object.assign(el.style, {
      left:               Math.random() * 100 + 'vw',
      bottom:             '-60px',
      fontSize:           (1.2 + Math.random() * 1.8) + 'rem',
      opacity:            0.04 + Math.random() * 0.05,
      animationDuration:  dur + 's',
      animationDelay:     delay + 's',
    });
    runes.appendChild(el);
    setTimeout(() => el.remove(), (dur + Math.abs(delay)) * 1000 + 500);
  }

  for (let i = 0; i < 14; i++) setTimeout(createRune, i * 1200);
  setInterval(createRune, 2200);

  /* --- Magic burst on success --- */
  const burst = document.getElementById('magic-burst');
  const BURST_COLORS = ['#62d9ff','#88f3b9','#ffd76a','#c080ff','#ffffff','#5ef5a0'];

  window.triggerMagicBurst = function(x, y) {
    for (let i = 0; i < 22; i++) {
      const p   = document.createElement('div');
      p.className = 'burst-particle';
      const size  = 4 + Math.random() * 8;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 60 + Math.random() * 140;
      const bx    = Math.cos(angle) * dist;
      const by    = Math.sin(angle) * dist;
      Object.assign(p.style, {
        width:    size + 'px',
        height:   size + 'px',
        left:     (x - size / 2) + 'px',
        top:      (y - size / 2) + 'px',
        background: BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)],
        boxShadow: `0 0 ${size*2}px ${BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)]}`,
        '--bx':   bx + 'px',
        '--by':   by + 'px',
        animationDuration: (.5 + Math.random() * .6) + 's',
        animationDelay:    (Math.random() * .15) + 's',
      });
      burst.appendChild(p);
      setTimeout(() => p.remove(), 1200);
    }
  };

  /* Cursor sparkle trail */
  let lastTrail = 0;
  document.addEventListener('mousemove', function(e) {
    const now = Date.now();
    if (now - lastTrail < 90) return;
    lastTrail = now;
    if (Math.random() > 0.5) return; /* skip some for subtlety */
    const p = document.createElement('div');
    p.className = 'spark';
    const size  = 2 + Math.random() * 3;
    const color = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];

      bottom: 'auto',
      background: color + '0.9)',
      boxShadow: `0 0 ${size*4}px ${color}0.6)`,

      animationDelay: '0s',
      zIndex: 9998,
    });

    setTimeout(() => p.remove(), 1600);
  });
})();
</script>
